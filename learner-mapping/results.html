<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרופיל למידה - YuviLab 720</title>
    <link rel="stylesheet" href="/shared/theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rubik', 'Segoe UI', sans-serif;
            background: linear-gradient(165deg, #f3f0fc 0%, #ece7f8 55%, #f4f1fc 100%);
            color: #2f2f44;
            min-height: 100vh;
            direction: rtl;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Bar */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 28px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 12px rgba(102,126,234,0.08);
        }
        .top-bar-title { font-weight: 700; font-size: 15px; color: #6F5BFF; }
        .top-bar-logo {
            font-weight: 800; font-size: 15px;
            background: linear-gradient(135deg, #6F5BFF, #9f7afe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Loading state */
        .loading-state {
            max-width: 760px;
            margin: 60px auto;
            text-align: center;
            padding: 40px 20px;
        }
        .loading-mascot {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 24px;
        }
        .loading-mascot .mascot-body {
            width: 80px; height: 80px;
            margin: 10px auto;
            background: linear-gradient(135deg, #6F5BFF, #9f7afe);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            animation: mascotBounce 1.2s ease-in-out infinite;
            box-shadow: 0 12px 30px rgba(111,91,255,0.35);
            position: relative;
        }
        .loading-mascot .mascot-body::before {
            content: '🧠';
            font-size: 36px;
            animation: brainPulse 1.8s ease-in-out infinite;
        }
        .loading-mascot .orbit-dot {
            position: absolute;
            width: 12px; height: 12px;
            border-radius: 50%;
            animation: orbit 2s linear infinite;
        }
        .loading-mascot .orbit-dot:nth-child(2) {
            background: #22d3ee;
            animation-delay: 0s;
        }
        .loading-mascot .orbit-dot:nth-child(3) {
            background: #f472b6;
            animation-delay: 0.66s;
        }
        .loading-mascot .orbit-dot:nth-child(4) {
            background: #fbbf24;
            animation-delay: 1.33s;
        }
        @keyframes orbit {
            0%   { transform: rotate(0deg) translateX(48px) rotate(0deg); opacity: 1; }
            50%  { opacity: 0.6; }
            100% { transform: rotate(360deg) translateX(48px) rotate(-360deg); opacity: 1; }
        }
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes brainPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .loading-state .text {
            font-size: 19px; font-weight: 700; color: #6F5BFF;
            margin-bottom: 8px;
        }
        .loading-state .sub {
            font-size: 14px; color: #9a93b5; margin-top: 4px;
        }
        .loading-steps {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 24px;
        }
        .loading-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #9a93b5;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .loading-step.visible {
            opacity: 1;
            transform: translateY(0);
            color: #6F5BFF;
        }
        .loading-step.done {
            color: #10b981;
        }
        .loading-step .step-icon {
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            background: #efecf8;
            transition: background 0.3s;
        }
        .loading-step.visible .step-icon {
            background: #ede9fe;
            animation: stepPulse 1s ease-in-out infinite;
        }
        .loading-step.done .step-icon {
            background: #d1fae5;
            animation: none;
        }
        @keyframes stepPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .loading-progress {
            width: 200px;
            height: 6px;
            background: #efecf8;
            border-radius: 3px;
            margin: 20px auto 0;
            overflow: hidden;
        }
        .loading-progress .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6F5BFF, #22d3ee);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-data-state {
            max-width: 760px;
            margin: 80px auto;
            text-align: center;
            padding: 40px 20px;
        }
        .no-data-state .emoji { font-size: 48px; margin-bottom: 16px; }
        .no-data-state .msg { font-size: 18px; font-weight: 700; color: #3a3360; margin-bottom: 12px; }
        .no-data-state .sub { font-size: 14px; color: #9a93b5; margin-bottom: 24px; }
        .no-data-state .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #6F5BFF, #9f7afe);
            color: #fff;
            border-radius: 14px;
            font-weight: 700;
            text-decoration: none;
            font-size: 15px;
        }

        /* ============================================
           JOURNEY — gradual discovery, one card at a time
           ============================================ */
        .journey {
            max-width: 560px;
            margin: 0 auto;
            padding: 18px 20px 56px;
            min-height: calc(100vh - 52px);
            display: flex;
            flex-direction: column;
        }

        /* Progress dots */
        .journey-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 8px 0 26px;
        }
        .journey-progress .dot {
            width: 8px; height: 8px;
            border-radius: 999px;
            background: #ddd6f3;
            transition: all 0.35s ease;
        }
        .journey-progress .dot.active {
            width: 26px;
            background: linear-gradient(90deg, #6F5BFF, #9f7afe);
        }
        .journey-progress .dot.done {
            background: #b9aef5;
        }

        /* Card stage */
        .journey-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scene {
            display: none;
            width: 100%;
        }
        .scene.active {
            display: block;
            animation: sceneIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes sceneIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Welcome scene */
        .welcome-card {
            text-align: center;
            padding: 10px;
        }
        .welcome-mascot {
            width: 110px; height: 110px;
            margin: 0 auto 22px;
            border-radius: 30px;
            background: linear-gradient(135deg, #6F5BFF 0%, #8b6cff 55%, #9f7afe 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 18px 44px rgba(111,91,255,0.34);
            animation: bob 3.2s ease-in-out infinite;
            position: relative;
        }
        .welcome-confetti {
            position: absolute;
            font-size: 30px;
            animation: pop 0.6s ease both;
        }
        @keyframes pop { from { transform: scale(0); } 60% { transform: scale(1.3); } to { transform: scale(1); } }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .welcome-card .title {
            font-size: 27px; font-weight: 800; color: #3a3360;
            margin-bottom: 12px; line-height: 1.3;
        }
        .welcome-card .sub {
            font-size: 17px; color: #6b6485; line-height: 1.6;
            max-width: 420px; margin: 0 auto 8px;
        }

        /* Generic big card (strength / improve) */
        .big-card {
            background: #fff;
            border-radius: 28px;
            padding: 34px 28px 30px;
            text-align: center;
            box-shadow: 0 16px 44px rgba(102,126,234,0.14);
            border: 1px solid #f0ecfb;
        }
        .big-card .kicker {
            display: inline-block;
            font-size: 13px; font-weight: 700;
            color: #6F5BFF;
            background: rgba(111,91,255,0.10);
            padding: 6px 16px; border-radius: 999px;
            margin-bottom: 20px;
        }
        .big-card .big-ico {
            width: 96px; height: 96px;
            margin: 0 auto 20px;
            border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            font-size: 46px;
            background: linear-gradient(135deg, #efeaff, #e4f6fb);
            animation: bob 3.5s ease-in-out infinite;
        }
        .big-card .big-name {
            font-size: 24px; font-weight: 800; color: #3a3360; margin-bottom: 10px;
        }
        .big-card .big-desc {
            font-size: 16px; color: #6b6485; line-height: 1.6;
            max-width: 400px; margin: 0 auto;
        }

        /* "Why is this important" expander */
        .why-toggle {
            margin-top: 18px;
            background: none; border: none;
            color: #6F5BFF; font-weight: 700; font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .why-toggle .chev { transition: transform 0.3s; font-size: 12px; }
        .why-toggle.open .chev { transform: rotate(180deg); }
        .why-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease, margin 0.4s ease;
            font-size: 14px; color: #8b85a6; line-height: 1.6;
        }
        .why-body.open { max-height: 200px; margin-top: 12px; }

        /* Reaction buttons (strengths) */
        .reactions {
            display: flex; gap: 10px; justify-content: center;
            margin-top: 22px;
        }
        .reaction-btn {
            background: #f6f3ff;
            border: 1.5px solid #ece6fb;
            color: #5a5478;
            font-family: inherit; font-size: 14px; font-weight: 700;
            padding: 10px 18px; border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reaction-btn:hover { transform: translateY(-2px); border-color: #c9bdf6; }
        .reaction-btn.selected {
            background: linear-gradient(135deg, #6F5BFF, #9f7afe);
            color: #fff; border-color: transparent;
        }

        /* Plan scene — small action steps */
        .plan-head {
            text-align: center;
            margin-bottom: 22px;
        }
        .plan-head .e { font-size: 40px; display: block; margin-bottom: 10px; }
        .plan-head .title { font-size: 23px; font-weight: 800; color: #3a3360; }
        .plan-steps { display: flex; flex-direction: column; gap: 12px; }
        .plan-step {
            display: flex; align-items: center; gap: 16px;
            background: #fff;
            border-radius: 18px;
            padding: 16px 20px;
            box-shadow: 0 8px 24px rgba(102,126,234,0.10);
            border: 1px solid #f0ecfb;
            opacity: 0; transform: translateX(16px);
            animation: stepIn 0.5s ease forwards;
        }
        @keyframes stepIn { to { opacity: 1; transform: translateX(0); } }
        .plan-step .num {
            flex-shrink: 0;
            width: 40px; height: 40px;
            border-radius: 13px;
            background: linear-gradient(135deg, #6F5BFF, #9f7afe);
            color: #fff; font-weight: 800; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .plan-step .t { font-size: 15px; font-weight: 600; color: #43406a; line-height: 1.45; }

        /* Navigation */
        .journey-nav {
            margin-top: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 16px 34px;
            background: linear-gradient(135deg, #6F5BFF 0%, #9f7afe 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px; font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(111,91,255,0.30);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 18px 38px rgba(111,91,255,0.4); }
        .nav-btn.ghost {
            background: #fff;
            color: #6F5BFF;
            box-shadow: 0 6px 18px rgba(102,126,234,0.10);
            border: 1.5px solid #ece6fb;
        }
        .nav-btn.ghost:hover { box-shadow: 0 10px 24px rgba(102,126,234,0.16); }

        @media (max-width: 600px) {
            .welcome-card .title { font-size: 23px; }
            .big-card { padding: 28px 20px 26px; }
            .big-card .big-name { font-size: 21px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="top-bar-title" id="topBarTitle">פרופיל הלמידה שלי</span>
        <span class="top-bar-logo">YuviLab 720</span>
    </div>

    <!-- Loading state -->
    <div class="loading-state" id="loadingState" style="display:none">
        <div class="loading-mascot">
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="mascot-body"></div>
        </div>
        <div class="text">יובי מנתח את הפרופיל שלך... 🔍</div>
        <div class="sub">זה הולך להיות מעניין!</div>
        <div class="loading-steps" id="loadingSteps">
            <div class="loading-step" data-delay="500">
                <span class="step-icon">🎯</span>
                <span>מזהה את הסגנון שלך...</span>
            </div>
            <div class="loading-step" data-delay="1500">
                <span class="step-icon">💡</span>
                <span>מחפש חוזקות מיוחדות...</span>
            </div>
            <div class="loading-step" data-delay="2500">
                <span class="step-icon">🗺️</span>
                <span>בונה מסלול אישי בדיוק בשבילך...</span>
            </div>
            <div class="loading-step" data-delay="3500">
                <span class="step-icon">✨</span>
                <span>מכין הפתעות!</span>
            </div>
        </div>
        <div class="loading-progress">
            <div class="bar" id="loadingBar"></div>
        </div>
    </div>

    <!-- No data state -->
    <div class="no-data-state" id="noDataState" style="display:none">
        <div class="emoji">📋</div>
        <div class="msg">עדיין אין לנו נתונים</div>
        <div class="sub">כדי לקבל פרופיל למידה אישי, צריך קודם למלא את השאלון</div>
        <a class="btn" href="/learner-mapping/">למילוי השאלון →</a>
    </div>

    <div class="journey" id="journey" style="display:none">
        <!-- Progress dots -->
        <div class="journey-progress" id="journeyProgress"></div>

        <!-- Card stage (scenes injected here) -->
        <div class="journey-stage" id="journeyStage"></div>

        <!-- Navigation -->
        <div class="journey-nav" id="journeyNav"></div>
    </div>

    <script>
        // =============================
        // JOURNEY STATE
        // =============================
        let journeySteps = [];
        let journeyIndex = 0;

        // =============================
        // BUILD journey from AI-generated profile
        // =============================
        function render(profile, name) {
            document.getElementById('topBarTitle').textContent = `הפרופיל של ${name}`;

            const strengths = (profile.strengths || []).slice(0, 3);
            const improve = (profile.improve || []).slice(0, 2);
            const tips = (profile.tips || []).slice(0, 3);

            journeySteps = [];

            // 1. Welcome — short empowering message only
            journeySteps.push({ type: 'welcome', name });

            // 2. One strength card at a time
            strengths.forEach((s, i) => {
                journeySteps.push({ type: 'strength', data: s, index: i, total: strengths.length });
            });

            // 3. One "what helps me move forward" card at a time
            improve.forEach((s, i) => {
                journeySteps.push({ type: 'improve', data: s, index: i, total: improve.length });
            });

            // 4. Small action plan (all 3 small steps together)
            if (tips.length) {
                journeySteps.push({ type: 'plan', tips });
            }

            // 5. Final — go to dashboard
            journeySteps.push({ type: 'done', name });

            journeyIndex = 0;
            document.getElementById('journey').style.display = 'flex';
            renderProgress();
            renderScene();
        }

        function renderProgress() {
            const el = document.getElementById('journeyProgress');
            el.innerHTML = journeySteps.map((_, i) => {
                const cls = i === journeyIndex ? 'active' : (i < journeyIndex ? 'done' : '');
                return `<span class="dot ${cls}"></span>`;
            }).join('');
        }

        function renderScene() {
            const stage = document.getElementById('journeyStage');
            const nav = document.getElementById('journeyNav');
            const step = journeySteps[journeyIndex];
            const isLast = journeyIndex === journeySteps.length - 1;
            const isFirst = journeyIndex === 0;

            let html = '';
            if (step.type === 'welcome') {
                html = `
                    <div class="scene active welcome-card">
                        <div class="welcome-mascot">
                            <span style="font-size:54px">🎉</span>
                        </div>
                        <div class="title">${step.name}, סיימנו את המיפוי!</div>
                        <div class="sub">גיליתי כמה דברים שיעזרו לי להתאים לך למידה בדיוק בדרך שלך.</div>
                    </div>`;
            } else if (step.type === 'strength') {
                const s = step.data;
                const ordinal = ['הראשונה', 'השנייה', 'השלישית'][step.index] || '';
                html = `
                    <div class="scene active">
                        <div class="big-card">
                            <span class="kicker">החוזקה ${ordinal} שלך 💪</span>
                            <div class="big-ico">${s.icon}</div>
                            <div class="big-name">${s.label}</div>
                            <div class="big-desc">${shorten(s.desc)}</div>
                            <div class="reactions" id="reactions">
                                <button class="reaction-btn" onclick="reactSelect(this)">נשמע כמוני 😊</button>
                                <button class="reaction-btn" onclick="reactSelect(this)">לא בטוח 🤔</button>
                            </div>
                        </div>
                    </div>`;
            } else if (step.type === 'improve') {
                const s = step.data;
                const why = s.tip || s.desc || '';
                html = `
                    <div class="scene active">
                        <div class="big-card">
                            <span class="kicker">מה יעזור לי להתקדם 🌱</span>
                            <div class="big-ico">${s.icon}</div>
                            <div class="big-name">${softLabel(s.label)}</div>
                            <div class="big-desc">${shorten(s.tip || s.desc)}</div>
                            ${why ? `
                            <button class="why-toggle" onclick="toggleWhy(this)">
                                <span>למה זה חשוב?</span><span class="chev">▾</span>
                            </button>
                            <div class="why-body">${stripScores(s.desc || why)}</div>` : ''}
                        </div>
                    </div>`;
            } else if (step.type === 'plan') {
                html = `
                    <div class="scene active">
                        <div class="plan-head">
                            <span class="e">💪</span>
                            <div class="title">הצעדים הקטנים שלי</div>
                        </div>
                        <div class="plan-steps">
                            ${step.tips.map((t, i) => `
                                <div class="plan-step" style="animation-delay:${0.15 + i * 0.12}s">
                                    <div class="num">${i + 1}</div>
                                    <div class="t">${t}</div>
                                </div>`).join('')}
                        </div>
                    </div>`;
            } else if (step.type === 'done') {
                html = `
                    <div class="scene active welcome-card">
                        <div class="welcome-mascot">
                            <span style="font-size:50px">🚀</span>
                        </div>
                        <div class="title">מוכנים להתחיל?</div>
                        <div class="sub">מעכשיו נלמד יחד בדרך שמתאימה בדיוק לך.</div>
                    </div>`;
            }

            stage.innerHTML = html;

            // Navigation buttons
            let navHtml = '';
            if (!isFirst && !isLast) {
                navHtml += `<button class="nav-btn ghost" onclick="journeyBack()">→ הקודם</button>`;
            }
            if (step.type === 'welcome') {
                navHtml += `<button class="nav-btn" onclick="journeyNext()">בוא נראה מה גיליתי ✨</button>`;
            } else if (isLast) {
                navHtml += `<a class="nav-btn" href="/student-dashboard/">מתחילים ללמוד בדרך שלי ←</a>`;
            } else {
                navHtml += `<button class="nav-btn" onclick="journeyNext()">הבא ←</button>`;
            }
            nav.innerHTML = navHtml;
        }

        function journeyNext() {
            if (journeyIndex < journeySteps.length - 1) {
                journeyIndex++;
                renderProgress();
                renderScene();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        function journeyBack() {
            if (journeyIndex > 0) {
                journeyIndex--;
                renderProgress();
                renderScene();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        function reactSelect(btn) {
            btn.parentElement.querySelectorAll('.reaction-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        function toggleWhy(btn) {
            btn.classList.toggle('open');
            const body = btn.nextElementSibling;
            body.classList.toggle('open');
        }

        // Keep text short — 1-2 lines max
        function shorten(txt) {
            if (!txt) return '';
            let clean = stripScores(txt.trim());
            // Cut at first sentence boundary if it's long
            if (clean.length > 90) {
                const dot = clean.indexOf('. ');
                if (dot > 20 && dot < 90) return clean.slice(0, dot + 1);
                return clean.slice(0, 88).trim() + '…';
            }
            return clean;
        }
        // Safety net — the student must never see mapping scores.
        // Removes stray numbers/percent that the AI might slip into strength/improve text.
        function stripScores(txt) {
            return txt
                // "קיבלת 100 ב..." / "עם 65 ב..." / "ציון 80" / "100%"
                .replace(/\b\d{1,3}\s*%/g, '')
                .replace(/(?:קיבלת|עם|ציון|ציונך|של)\s*\d{1,3}\b/g, m => m.replace(/\d{1,3}/, '').trim())
                .replace(/\b\d{1,3}\b/g, '')
                // tidy leftover double spaces / dangling prepositions
                .replace(/\s{2,}/g, ' ')
                .replace(/\s+([.,!?…])/g, '$1')
                .trim();
        }
        // Soften "deficit" style labels into opportunity framing
        function softLabel(label) {
            const map = {
                'שליטה בטכנולוגיה': 'להרגיש בטוח עם כלים דיגיטליים',
                'הכרה עצמית': 'להכיר מה עוזר לי ללמוד',
                'מודעות עצמית': 'להכיר מה עוזר לי ללמוד',
                'התמדה': 'להמשיך גם כשמאתגר',
                'ארגון': 'לסדר את הדרך שלי'
            };
            return map[label] || label;
        }

        // =============================
        // LOAD & ANALYZE
        // =============================
        async function loadResults() {
            const stored = localStorage.getItem('mapping_results');
            if (!stored) {
                document.getElementById('noDataState').style.display = '';
                return;
            }

            const data = JSON.parse(stored);
            const name = data.student_name || 'תלמיד/ה';

            // Check cache - reuse if mapping data hasn't changed
            const cacheKey = 'profile_cache_v2';
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const cacheObj = JSON.parse(cached);
                    if (cacheObj.sourceHash === stored) {
                        render(cacheObj.data, name);
                        return;
                    }
                } catch (e) { /* cache corrupt, regenerate */ }
            }

            // Show loading
            document.getElementById('loadingState').style.display = '';
            document.getElementById('journey').style.display = 'none';
            startLoadingAnimation();

            try {
                // Call AI to analyze the profile
                const resp = await fetch('/api/analyze-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_name: name, scores: data.scores })
                });

                if (!resp.ok) throw new Error('API error');

                const profile = await resp.json();

                // Cache the result
                localStorage.setItem(cacheKey, JSON.stringify({ sourceHash: stored, data: profile }));

                // Hide loading, show journey
                document.getElementById('loadingState').style.display = 'none';

                render(profile, name);
            } catch (err) {
                console.error('Profile analysis error:', err);
                // Hide loading, show journey with fallback render
                document.getElementById('loadingState').style.display = 'none';
                renderFallback(data, name);
            }
        }

        function renderFallback(data, name) {
            // Minimal journey if AI fails — still gentle, no raw report
            const profile = {
                strengths: [
                    { icon: '🎯', label: 'ריכוז', desc: 'אתה מצליח להישאר ממוקד כשיש לך מטרה ברורה.' },
                    { icon: '💡', label: 'סקרנות', desc: 'אתה אוהב לגלות איך דברים עובדים.' }
                ],
                improve: [],
                tips: [
                    'ללמוד ביחידות קצרות של 15 דקות',
                    'לבחור מטרה קטנה לפני כל משימה',
                    'לעצור בסוף ולכתוב: מה עבד לי טוב?'
                ]
            };
            render(profile, name);
        }

        function startLoadingAnimation() {
            const steps = document.querySelectorAll('#loadingSteps .loading-step');
            const bar = document.getElementById('loadingBar');
            let current = 0;

            function showNext() {
                if (current >= steps.length) return;
                // Mark previous as done
                if (current > 0) steps[current - 1].classList.add('done');
                steps[current].classList.add('visible');
                // Update progress bar
                bar.style.width = ((current + 1) / steps.length * 100) + '%';
                current++;
                if (current < steps.length) {
                    setTimeout(showNext, 1200);
                } else {
                    // Mark last as done after a moment
                    setTimeout(() => steps[current - 1].classList.add('done'), 800);
                }
            }

            setTimeout(showNext, 500);
        }

        loadResults();
    </script>
</body>
