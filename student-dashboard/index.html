<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדשבורד שלי - YuviLab 720</title>
    <link rel="stylesheet" href="/shared/theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rubik', 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            direction: rtl;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 220px;
            height: 100vh;
            background: #fff;
            border-left: 1px solid #f0edf7;
            display: flex;
            flex-direction: column;
            z-index: 50;
            padding: 20px 0;
        }

        .sidebar-logo {
            text-align: center;
            padding: 0 16px 18px;
            border-bottom: 1px solid #f5f3fa;
        }

        .sidebar-logo h2 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-logo span {
            font-size: 0.68rem;
            color: var(--text-light);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-medium);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-item:hover { background: #f5f3fa; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(124,92,255,0.08), rgba(159,122,254,0.06));
            color: #7c5cff;
            font-weight: 600;
        }

        .nav-item .nav-icon { font-size: 1rem; }

        .sidebar-profile {
            padding: 14px 16px;
            border-top: 1px solid #f5f3fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .profile-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .profile-role {
            font-size: 0.65rem;
            color: var(--text-light);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-right: 220px;
            padding: 24px 28px;
            min-height: 100vh;
            max-width: 1100px;
        }

        /* Header */
        .page-header {
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(124,92,255,0.04), rgba(159,122,254,0.02));
            border-radius: 16px;
            padding: 18px 22px;
        }

        .page-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #4a3d8f;
            margin-bottom: 2px;
        }

        .page-header p {
            font-size: 0.82rem;
            color: var(--text-light);
        }

        .last-update {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Live pulse dot */
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #48bb78;
            position: relative;
            flex-shrink: 0;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #48bb78;
            animation: livePulse 1.8s ease-out infinite;
        }
        @keyframes livePulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3.2); opacity: 0; }
        }

        /* Header layout with mascot */
        .header-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-mascot {
            flex-shrink: 0;
            width: 60px; height: 60px;
            border-radius: 18px;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(124,92,255,0.28);
            animation: bob 3.4s ease-in-out infinite;
        }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .header-text { flex: 1; }

        /* Personal detail chips */
        .personal-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .personal-chip {
            font-size: 0.7rem;
            font-weight: 500;
            color: #5a4a9f;
            background: rgba(124,92,255,0.08);
            padding: 3px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Real-time update toast */
        .live-toast {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%) translateY(140%);
            z-index: 300;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 12px 34px rgba(124,92,255,0.22);
            border: 1px solid #efeafd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 340px;
            transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .live-toast.show { transform: translateX(-50%) translateY(0); }
        .live-toast .toast-ico {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .live-toast .toast-text { font-size: 0.8rem; color: var(--text-dark); font-weight: 500; line-height: 1.4; }
        .live-toast .toast-text small { display: block; font-size: 0.66rem; color: var(--text-muted); font-weight: 400; margin-top: 1px; }

        /* Section Titles */
        .section-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: #7c5cff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title .emoji { font-size: 0.95rem; }

        /* ===== TWO COLUMN LAYOUT ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-grid .full-width {
            grid-column: 1 / -1;
        }

        /* ===== SUBJECTS PROGRESS ===== */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .subject-card {
            background: #fff;
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s;
        }

        .subject-card:hover { transform: translateY(-2px); }

        .subject-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .subject-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subject-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }

        .subject-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .subject-level {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 6px;
            font-weight: 500;
        }

        .level-great { background: rgba(72,187,120,0.1); color: #38a169; }
        .level-good { background: rgba(99,179,237,0.1); color: #3182ce; }
        .level-building { background: rgba(246,173,85,0.1); color: #c05621; }

        .subject-progress-bar {
            height: 7px;
            background: #f0edf7;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .subject-progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .subject-progress-label {
            font-size: 0.72rem;
            color: var(--text-light);
        }

        /* ===== DIFFICULTIES ===== */
        .difficulties-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .difficulty-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
            border-right: 3px solid #f6ad55;
        }

        .difficulty-subject-tag {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(246,173,85,0.1);
            color: #c05621;
            white-space: nowrap;
        }

        .difficulty-text {
            font-size: 0.8rem;
            color: var(--text-medium);
            flex: 1;
        }

        .difficulty-status {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 5px;
            white-space: nowrap;
        }

        .status-working { background: rgba(99,179,237,0.1); color: #3182ce; }
        .status-new { background: rgba(246,173,85,0.1); color: #c05621; }
        .status-improving { background: rgba(72,187,120,0.1); color: #38a169; }

        /* ===== GOALS / MENTORING ===== */
        .goals-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .goal-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
        }

        .goal-checkbox {
            width: 20px; height: 20px;
            border-radius: 6px;
            border: 2px solid #e2e0ee;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .goal-checkbox.done {
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            border-color: #7c5cff;
        }

        .goal-checkbox.done::after {
            content: '✓';
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .goal-content { flex: 1; }

        .goal-text {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .goal-meta {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .goal-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .add-goal-btn {
            font-family: 'Rubik', sans-serif;
            font-size: 0.76rem;
            font-weight: 600;
            color: #7c5cff;
            background: rgba(124,92,255,0.06);
            border: 1px dashed rgba(124,92,255,0.35);
            border-radius: 10px;
            padding: 9px 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .add-goal-btn:hover { background: rgba(124,92,255,0.12); border-style: solid; }

        /* ===== MAPPING / PROFILE ===== */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .profile-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
        }

        .profile-card-label {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .profile-tag {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(124,92,255,0.06);
            color: #5a4a9f;
            font-weight: 500;
        }

        .profile-value {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        /* ===== COMPETENCIES (ACTIVISM) ===== */
        .competencies-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .competency-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .competency-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .competency-label {
            font-size: 0.73rem;
            color: var(--text-medium);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .competency-bar-track {
            height: 5px;
            background: #f0edf7;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .competency-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .competency-descriptor {
            font-size: 0.67rem;
            color: var(--text-light);
            font-style: italic;
        }

        /* ===== MOCK SELECTOR ===== */
        .mock-selector {
            position: fixed;
            bottom: 92px;
            left: 12px;
            z-index: 200;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 8px 10px;
        }

        .mock-selector label {
            font-size: 0.62rem;
            color: var(--text-light);
            display: block;
            margin-bottom: 2px;
        }

        .mock-selector select {
            font-family: 'Rubik', sans-serif;
            font-size: 0.72rem;
            padding: 3px 6px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            direction: rtl;
        }

        /* ===== YUBI CHAT ===== */
        .yubi-fab {
            position: fixed; bottom: 20px; left: 20px; z-index: 250;
            width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            box-shadow: 0 10px 28px rgba(124,92,255,0.45);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.25s;
            animation: fabBob 3s ease-in-out infinite;
        }
        @keyframes fabBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        .yubi-fab:hover { transform: scale(1.08); }
        .yubi-fab .fab-ping {
            position: absolute; top: 4px; right: 4px; width: 13px; height: 13px;
            background: #48bb78; border-radius: 50%; border: 2px solid #fff;
        }
        .yubi-fab.hidden { display: none; }

        .yubi-chat {
            position: fixed; bottom: 20px; left: 20px; z-index: 260;
            width: 372px; max-width: calc(100vw - 40px);
            height: 544px; max-height: calc(100vh - 40px);
            background: #fff; border-radius: 22px; overflow: hidden;
            box-shadow: 0 24px 60px rgba(76,58,160,0.32);
            display: flex; flex-direction: column;
            transform: translateY(24px) scale(0.95); opacity: 0; pointer-events: none;
            transition: all 0.32s cubic-bezier(0.18,0.89,0.32,1.1);
        }
        .yubi-chat.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

        .yubi-chat-head {
            display: flex; align-items: center; gap: 9px;
            padding: 11px 13px; color: #fff;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
        }
        .yubi-head-ava { width: 36px; height: 36px; border-radius: 11px; background: rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .yubi-head-info { line-height: 1.2; }
        .yubi-head-info strong { font-size: 0.9rem; display:block; }
        .yubi-head-info small { font-size: 0.64rem; opacity: 0.9; display:flex; align-items:center; gap:4px; }
        .yubi-head-info .dot { width:6px;height:6px;border-radius:50%;background:#7ef0a8; display:inline-block; }
        .mode-toggle { display:flex; gap:3px; background: rgba(255,255,255,0.16); padding:3px; border-radius:10px; margin-right:auto; }
        .mode-toggle button { border:none; background:transparent; color:#fff; font-family:'Rubik',sans-serif; font-size:0.66rem; padding:5px 8px; border-radius:8px; cursor:pointer; opacity:0.85; transition: all 0.2s; white-space:nowrap; }
        .mode-toggle button.active { background:#fff; color:#7c5cff; opacity:1; font-weight:600; }
        .yubi-close { background: rgba(255,255,255,0.2); border:none; color:#fff; width:28px;height:28px;border-radius:8px; cursor:pointer; font-size:0.8rem; flex-shrink:0; }

        /* text mode */
        .chat-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; background:#faf9ff; }
        .msg-row { display:flex; gap:8px; align-items:flex-end; max-width:88%; }
        .msg-row.bot { align-self:flex-start; }
        .msg-row.user { align-self:flex-end; flex-direction: row-reverse; }
        .msg-ava { width:28px;height:28px;border-radius:9px;flex-shrink:0; display:flex;align-items:center;justify-content:center; background:linear-gradient(135deg,#7c5cff,#9f7afe); }
        .bubble { padding:9px 13px; border-radius:14px; font-size:0.82rem; line-height:1.5; }
        .msg-row.bot .bubble { background:#fff; color:#3a3360; border-bottom-right-radius:4px; box-shadow:0 2px 8px rgba(124,92,255,0.08); }
        .msg-row.user .bubble { background:linear-gradient(135deg,#7c5cff,#9f7afe); color:#fff; border-bottom-left-radius:4px; }
        .typing { display:flex; gap:4px; padding:12px 14px; background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(124,92,255,0.08); }
        .typing span { width:7px;height:7px;border-radius:50%;background:#c4b5fd; animation:typedot 1.2s infinite; }
        .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
        @keyframes typedot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

        .chat-suggestions { display:flex; gap:6px; flex-wrap:wrap; padding:0 14px 8px; background:#faf9ff; }
        .chat-suggestions button { font-family:'Rubik',sans-serif; font-size:0.7rem; color:#7c5cff; background:#fff; border:1px solid #e7e0fb; border-radius:999px; padding:5px 11px; cursor:pointer; transition:all 0.2s; }
        .chat-suggestions button:hover { background:#7c5cff; color:#fff; }

        .chat-input { display:flex; gap:8px; padding:10px 12px; border-top:1px solid #f0edf7; background:#fff; }
        .chat-input input { flex:1; border:1px solid #e7e0fb; border-radius:999px; padding:9px 14px; font-family:'Rubik',sans-serif; font-size:0.82rem; outline:none; }
        .chat-input input:focus { border-color:#7c5cff; }
        .chat-input button { width:38px;height:38px;border-radius:50%; border:none; background:linear-gradient(135deg,#7c5cff,#9f7afe); color:#fff; cursor:pointer; font-size:1rem; flex-shrink:0; }

        /* voice mode (jarvis) */
        .voice-stage { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:22px; background: radial-gradient(circle at 50% 38%, #1e1b3a, #0c0a1d); }
        .yubi-chat.voice .chat-body, .yubi-chat.voice .chat-suggestions, .yubi-chat.voice .chat-input { display:none; }
        .yubi-chat.voice .voice-stage { display:flex; }

        .jarvis-orb { position:relative; width:180px; height:180px; display:flex; align-items:center; justify-content:center; }
        .jarvis-ring { position:absolute; border-radius:50%; }
        .r1{ width:96px;height:96px; border:2px solid rgba(76,201,240,0.55);} .r2{ width:138px;height:138px; border:2px solid rgba(124,92,255,0.4);} .r3{ width:180px;height:180px; border:2px solid rgba(76,201,240,0.2);}
        .jarvis-core { width:74px;height:74px;border-radius:50%; background: radial-gradient(circle at 35% 30%, #6ee7ff, #4cc9f0 42%, #7c5cff); box-shadow:0 0 34px rgba(76,201,240,0.7), inset 0 0 22px rgba(255,255,255,0.4); transition: opacity 0.3s, background 0.3s; }
        .jarvis-bars { position:absolute; display:flex; gap:4px; align-items:center; height:60px; opacity:0; transition:opacity 0.3s; }
        .jarvis-bars i { width:5px; height:12px; background:linear-gradient(#6ee7ff,#7c5cff); border-radius:3px; display:inline-block; }

        .jarvis-orb.idle .jarvis-ring { animation: ringPulse 3s ease-in-out infinite; }
        .jarvis-orb.idle .jarvis-core { animation: coreFloat 3s ease-in-out infinite; }
        .jarvis-orb.active .jarvis-core { opacity:0.2; }
        .jarvis-orb.active .jarvis-bars { opacity:1; }
        .jarvis-orb.active .jarvis-bars i { animation: barJump 0.7s ease-in-out infinite; }
        .jarvis-orb.active .jarvis-ring { animation: ringPulseFast 1.1s ease-in-out infinite; }
        .jarvis-orb.listening .jarvis-core { background: radial-gradient(circle at 35% 30%, #7ef0a8, #48bb78 42%, #4cc9f0); }

                        <div class="personal-chips">
                            <span class="personal-chip">🎂 גיל ${p.age}</span>
                            <span class="personal-chip">🏫 כיתה ${p.class}</span>
                            <span class="personal-chip">📍 ${p.school}</span>
                        </div>` : '';

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <!-- Header -->
                <div class="page-header fade-in">
                    <div class="header-row">
                        <div class="header-mascot">
                            <svg viewBox="0 0 44 44" width="36" height="36" fill="none">
                                <rect x="9" y="15" width="26" height="21" rx="6" fill="#fff"/>
                                <rect x="15" y="21" width="5" height="5" rx="2" fill="#7c5cff"/>
                                <rect x="24" y="21" width="5" height="5" rx="2" fill="#7c5cff"/>
                                <path d="M18 30 Q22 33 26 30" stroke="#22d3ee" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                                <rect x="17" y="8" width="10" height="8" rx="3" fill="#fff" fill-opacity="0.9"/>
                                <rect x="21" y="3.5" width="2.4" height="5" rx="1.2" fill="#c4b5fd"/>
                                <circle cx="22.2" cy="2.6" r="2.6" fill="#22d3ee"/>
                                <rect x="4" y="20" width="5" height="11" rx="2.5" fill="#fff" fill-opacity="0.9"/>
                                <rect x="35" y="20" width="5" height="11" rx="2.5" fill="#fff" fill-opacity="0.9"/>
                            </svg>
                        </div>
                        <div class="header-text">
                            <h1>שלום, ${data.name}! 👋</h1>
                            <p>הנה סיכום ההתקדמות שלך</p>
                            ${personalChips}
                        </div>
                    </div>
                    <div class="last-update"><span class="live-dot"></span> הנתונים מתעדכנים בזמן אמת · עודכן ${new Date().toLocaleDateString('he-IL')}</div>
                </div>

                <!-- Subjects Progress - full width -->
                <div class="section-title"><span class="emoji">📚</span> המקצועות שלי</div>
                <div class="subjects-grid" id="subjectsGrid"></div>

                <!-- Two column: Difficulties + Goals side by side -->
                <div class="dashboard-grid">
                    <div>
                        <div class="section-title"><span class="emoji">💪</span> נקודות לחיזוק</div>
                        <div class="difficulties-list" id="difficultiesList"></div>
                    </div>
                    <div>
                        <div class="section-title"><span class="emoji">🎯</span> היעדים שלי</div>
                        <div class="goals-list" id="goalsList"></div>
                    </div>
                </div>

                <!-- Competencies - full width -->
                <div class="section-title"><span class="emoji">🏅</span> כשירויות ופעלנות</div>
                <div class="competencies-grid" id="competenciesGrid"></div>

                <!-- Profile / Mapping -->
                <div class="section-title"><span class="emoji">🧩</span> מה שגילינו עליך</div>
                <div class="profile-grid" id="profileGrid"></div>
            `;

            renderSubjects(data.subjects);
            renderDifficulties(data.difficulties);
            renderGoals(data.goals);
            renderMapping(data.mapping);
            renderCompetencies(data.competencies);
        }

        function renderSubjects(subjects) {
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = subjects.map((s, i) => `
                <div class="subject-card fade-in" style="animation-delay:${i * 0.06}s">
                    <div class="subject-card-header">
                        <div class="subject-card-title">
                            <div class="subject-icon" style="background: ${s.iconBg}">${s.icon}</div>
                            <span class="subject-name">${s.name}</span>
                        </div>
                        <span class="subject-level ${s.levelClass}">${s.level}</span>
                    </div>
                    <div class="subject-progress-bar">
                        <div class="subject-progress-fill" style="width: 0%; background: ${s.gradient}" data-target="${s.progress}"></div>
                    </div>
                    <div class="subject-progress-label">${s.description}</div>
                </div>
            `).join('');
            animateBars(grid.querySelectorAll('.subject-progress-fill'));
        }

        function animateBars(els) {
            requestAnimationFrame(() => {
                setTimeout(() => {
                    els.forEach(el => { el.style.width = el.dataset.target + '%'; });
                }, 120);
            });
        }

        function renderDifficulties(difficulties) {
            const list = document.getElementById('difficultiesList');
            list.innerHTML = difficulties.map(d => `
                <div class="difficulty-item fade-in">
                    <span class="difficulty-subject-tag">${d.subject}</span>
                    <span class="difficulty-text">${d.text}</span>
                    <span class="difficulty-status ${d.statusClass}">${d.status}</span>
                </div>
            `).join('');
        }

        function renderGoals(goals) {
            const list = document.getElementById('goalsList');
            list.innerHTML = goals.map((g, i) => `
                <div class="goal-item fade-in">
                    <div class="goal-checkbox ${g.done ? 'done' : ''}" data-index="${i}"></div>
                    <div class="goal-content">
                        <div class="goal-text" style="${g.done ? 'text-decoration: line-through; opacity: 0.6' : ''}">${g.text}</div>
                        <div class="goal-meta">${g.meta}</div>
                    </div>
                </div>
            `).join('') + `
                <button class="add-goal-btn" id="addGoalBtn">➕ הוסף יעד אישי</button>
            `;

            // Toggle goals
            list.querySelectorAll('.goal-checkbox').forEach(cb => {
                cb.addEventListener('click', () => {
                    cb.classList.toggle('done');
                    const textEl = cb.nextElementSibling.querySelector('.goal-text');
                    const done = cb.classList.contains('done');
                    if (done) {
                        textEl.style.textDecoration = 'line-through';
                        textEl.style.opacity = '0.6';
                        showLiveToast('כל הכבוד! סימנת יעד כהושם ✅', 'יובי עדכן את ההתקדמות שלך', '🎉');
                    } else {
                        textEl.style.textDecoration = 'none';
                        textEl.style.opacity = '1';
                    }
                });
            });

            // Add a personal goal
            const addBtn = document.getElementById('addGoalBtn');
            if (addBtn) {
                addBtn.addEventListener('click', () => {
                    const text = prompt('מה היעד האישי החדש שלך?');
                    if (text && text.trim()) {
                        const today = new Date().toLocaleDateString('he-IL');
                        const item = document.createElement('div');
                        item.className = 'goal-item fade-in';
                        item.innerHTML = `
                            <div class="goal-checkbox"></div>
                            <div class="goal-content">
                                <div class="goal-text">${text.trim()}</div>
                                <div class="goal-meta">יעד אישי - ${today}</div>
                            </div>`;
                        list.insertBefore(item, addBtn);
                        item.querySelector('.goal-checkbox').addEventListener('click', (ev) => {
                            ev.currentTarget.classList.toggle('done');
                            const t = ev.currentTarget.nextElementSibling.querySelector('.goal-text');
                            const done = ev.currentTarget.classList.contains('done');
                            t.style.textDecoration = done ? 'line-through' : 'none';
                            t.style.opacity = done ? '0.6' : '1';
                        });
                        showLiveToast('יעד חדש נוסף לכם! 🎯', 'היעד נשמר ומסונכרן למנטור שלך', '➕');
                    }
                });
            }
        }

        function renderMapping(mapping) {
            const grid = document.getElementById('profileGrid');
            grid.innerHTML = `
                <div class="profile-card fade-in">
                    <div class="profile-card-label">תחומי עניין</div>
                    <div class="profile-tags">${mapping.interests.map(i => `<span class="profile-tag">${i}</span>`).join('')}</div>
                </div>
                <div class="profile-card fade-in">
                    <div class="profile-card-label">סגנון למידה</div>
                    <div class="profile-value">${mapping.learningStyle}</div>
                </div>
                <div class="profile-card fade-in">
                    <div class="profile-card-label">העדפות</div>
                    <div class="profile-tags">${mapping.preferences.map(p => `<span class="profile-tag">${p}</span>`).join('')}</div>
                </div>
                <div class="profile-card fade-in">
                    <div class="profile-card-label">סביבת למידה</div>
                    <div class="profile-value">${mapping.environment}</div>
                </div>
                <div class="profile-card fade-in">
                    <div class="profile-card-label">חוזקות</div>
                    <div class="profile-tags">${mapping.strengths.map(s => `<span class="profile-tag">${s}</span>`).join('')}</div>
                </div>
            `;
        }

        function renderCompetencies(competencies) {
            const grid = document.getElementById('competenciesGrid');
            grid.innerHTML = competencies.map((c, i) => {
                const color = c.value >= 75 ? '#48bb78' : c.value >= 55 ? '#7c5cff' : '#f6ad55';
                return `
                    <div class="competency-card fade-in" style="animation-delay:${i * 0.05}s">
                        <div class="competency-icon">${c.icon}</div>
                        <div class="competency-label">${c.label}</div>
                        <div class="competency-bar-track">
                            <div class="competency-bar-fill" style="width: 0%; background: ${color}" data-target="${c.value}"></div>
                        </div>
                        <div class="competency-descriptor">${c.descriptor}</div>
                    </div>
                `;
            }).join('');
            animateBars(grid.querySelectorAll('.competency-bar-fill'));
        }

        // ================================================
        // LIVE TOAST (real-time feel)
        // ================================================
        let toastTimer = null;
        function showLiveToast(text, sub, ico) {
            const toast = document.getElementById('liveToast');
            const txt = document.getElementById('toastText');
            toast.querySelector('.toast-ico').textContent = ico || '📡';
            txt.innerHTML = `${text}${sub ? `<small>${sub}</small>` : ''}`;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 4200);
        }

        // ================================================
        // YUBI CHAT (text + voice/Jarvis demo)
        // ================================================
        const YUBI_SVG = `<svg viewBox="0 0 44 44" width="18" height="18" fill="none">
            <rect x="9" y="15" width="26" height="21" rx="6" fill="#fff"/>
            <rect x="15" y="21" width="5" height="5" rx="2" fill="#7c5cff"/>
            <rect x="24" y="21" width="5" height="5" rx="2" fill="#7c5cff"/>
            <path d="M18 30 Q22 33 26 30" stroke="#22d3ee" stroke-width="2.6" fill="none" stroke-linecap="round"/>
        </svg>`;

        let chatSeeded = false;
        let voiceTimers = [];

        function firstName() {
            return currentData ? currentData.name.split(' ')[0] : 'חבר';
        }

        // Personalized reply that proves Yubi knows the kid
        function generateReply(msg) {
            const d = currentData;
            if (!d) return 'בוא נתחיל! 😊';
            const m = (msg || '').toLowerCase();
            const name = firstName();
            const interests = d.mapping.interests;
            const strengths = d.mapping.strengths;
            const subjects = d.subjects;
            const diffs = d.difficulties;
            const best = [...subjects].sort((a, b) => b.progress - a.progress)[0];

            if (/(שלום|היי|הי |מה נשמע|מה קורה|בוקר טוב|היי)/.test(m))
                return `היי ${name}! 😊 ראיתי שאתה ממש מתקדם ב${best.name} ושאתה אוהב ${interests[0]}. במה אפשר לעזור היום?`;
            if (/(חוזק|טוב ב|במה אני טוב|מצטיין|מה אני יודע)/.test(m))
                return `אתה ממש חזק ב${best.name} (${best.level})! 💪 והחוזקות הבולטות שלך הן ${strengths.slice(0,2).join(' ו')}. תמשיך ככה!`;
            if (/(מתמטיק|חשבון|שברים|כפל)/.test(m)) {
                const md = diffs.find(x => x.subject === 'מתמטיקה');
                return md ? `במתמטיקה אנחנו עכשיו על "${md.text}" 🔢. בוא נפרק את זה לצעדים קטנים — אני בטוח שתצליח!`
                          : `מתמטיקה זה תחום שאתה מתקדם בו יפה! רוצה תרגול קטן ביחד?`;
            }
            if (/(קשה|לא מבין|תקוע|עזרה|לא מצליח|מתקשה)/.test(m))
                return `אל דאגה ${name} 🌟 ראיתי שאתה עובד על "${diffs[0].text}". זה לגמרי טבעי שלוקח זמן. בוא ננסה יחד צעד קטן אחד?`;
            if (/(משעמם|לא בא לי|אין חשק|לא כיף)/.test(m))
                return `מבין אותך 😄 אולי ננסה לחבר את הלמידה ל${interests[0]} או ${interests[1]}? ככה זה הרבה יותר כיף בשבילך!`;
            if (/(יעד|מטרה|מטרות|רוצה להשיג)/.test(m)) {
                const g = d.goals.find(x => !x.done);
                return g ? `היעד הקרוב שלך הוא: "${g.text}" 🎯. אני כאן ללוות אותך עד שתשיג אותו!`
                         : `כל הכבוד — סיימת את כל היעדים! 🎉 רוצה שנוסיף יעד חדש?`;
            }
            if (/(תודה|מגניב|אחלה|יאללה|מעולה)/.test(m))
                return `בכיף ${name}! 💜 אני תמיד כאן בשבילך.`;
            return `מעניין! 🤔 דרך אגב, ראיתי שאתה אוהב ${interests[Math.floor(Math.random() * interests.length)]} — נוכל לשלב את זה בלמידה. רוצה לנסות?`;
        }

        function addMsg(text, who) {
            const body = document.getElementById('chatBody');
            const row = document.createElement('div');
            row.className = 'msg-row ' + who;
            row.innerHTML = (who === 'bot' ? `<div class="msg-ava">${YUBI_SVG}</div>` : '') +
                `<div class="bubble">${text}</div>`;
            body.appendChild(row);
            body.scrollTop = body.scrollHeight;
        }

        function botReply(text) {
            const body = document.getElementById('chatBody');
            const typing = document.createElement('div');
            typing.className = 'msg-row bot';
            typing.innerHTML = `<div class="msg-ava">${YUBI_SVG}</div><div class="typing"><span></span><span></span><span></span></div>`;
            body.appendChild(typing);
            body.scrollTop = body.scrollHeight;
            setTimeout(() => {
                typing.remove();
                addMsg(text, 'bot');
            }, 850 + Math.min(text.length * 12, 900));
        }

        function renderSuggestions() {
            const sug = document.getElementById('chatSuggestions');
            const chips = ['במה אני טוב? 💪', 'עזור לי במתמטיקה 🔢', 'מה היעדים שלי? 🎯', 'קצת משעמם לי 😅'];
            sug.innerHTML = chips.map(c => `<button type="button">${c}</button>`).join('');
            sug.querySelectorAll('button').forEach(b => {
                b.addEventListener('click', () => sendUserMsg(b.textContent));
            });
        }

        function sendUserMsg(text) {
            if (!text.trim()) return;
            addMsg(text, 'user');
            const reply = generateReply(text);
            botReply(reply);
        }

        function resetChat() {
            const body = document.getElementById('chatBody');
            if (body) body.innerHTML = '';
            chatSeeded = false;
            // reset voice stage
            clearVoice();
        }

        function seedChat() {
            if (chatSeeded) return;
            chatSeeded = true;
            addMsg(generateReply('שלום'), 'bot');
            renderSuggestions();
        }

        // ---- Voice (Jarvis) ----
        function orbState(s) {
            const orb = document.getElementById('jarvisOrb');
            orb.className = 'jarvis-orb ' + (s === 'idle' ? 'idle' : s === 'listening' ? 'active listening' : 'active');
        }
        function clearVoice() {
            voiceTimers.forEach(t => clearTimeout(t));
            voiceTimers = [];
            const mic = document.getElementById('micBtn');
            if (mic) mic.classList.remove('recording');
            orbState('idle');
            const cap = document.getElementById('voiceCaption');
            if (cap) cap.textContent = 'לחצו על המיקרופון כדי לדבר עם יובי 🎤';
        }
        function startVoiceDemo() {
            clearVoice();
            const cap = document.getElementById('voiceCaption');
            const mic = document.getElementById('micBtn');
            mic.classList.add('recording');
            orbState('listening');
            cap.textContent = 'מקשיב לך... 🎧';
            voiceTimers.push(setTimeout(() => {
                orbState('idle');
                mic.classList.remove('recording');
                cap.textContent = 'חושב... 💭';
            }, 2000));
            voiceTimers.push(setTimeout(() => {
                const reply = generateReply('שלום');
                orbState('speaking');
                cap.textContent = '🔊 ' + reply;
            }, 2900));
            voiceTimers.push(setTimeout(() => {
                orbState('idle');
                document.getElementById('voiceCaption').textContent = 'לחצו שוב כדי לדבר עם יובי 🎤';
            }, 7500));
        }

        // ---- Open / close / mode ----
        function openChat() {
            document.getElementById('yubiChat').classList.add('open');
            document.getElementById('yubiFab').classList.add('hidden');
            seedChat();
        }
        function closeChat() {
            document.getElementById('yubiChat').classList.remove('open');
            document.getElementById('yubiFab').classList.remove('hidden');
            clearVoice();
        }

        document.getElementById('yubiFab').addEventListener('click', openChat);
        document.getElementById('yubiClose').addEventListener('click', closeChat);
        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            sendUserMsg(input.value);
            input.value = '';
        });
        document.querySelectorAll('.mode-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const chat = document.getElementById('yubiChat');
                if (btn.dataset.mode === 'voice') {
                    chat.classList.add('voice');
                    clearVoice();
                } else {
                    chat.classList.remove('voice');
                    clearVoice();
                }
            });
        });
        document.getElementById('micBtn').addEventListener('click', startVoiceDemo);

        // ================================================
        // EVENTS
        // ================================================
        document.getElementById('mockStudentSelect').addEventListener('change', (e) => {
            renderDashboard(e.target.value);
        });

        // Initial render
        renderDashboard('student_001');

        // Simulate a live update shortly after load (demo "alive" feel)
        setTimeout(() => {
            showLiveToast('יובי זיהה שהתקדמת במתמטיקה! 📈', 'הדשבורד מתעדכן בזמן אמת', '🚀');
        }, 2600);
    </script>
</body>
</html>
