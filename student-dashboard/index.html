<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדשבורד שלי - YuviLab 720</title>
    <link rel="stylesheet" href="/shared/theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rubik', 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            direction: rtl;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 220px;
            height: 100vh;
            background: #fff;
            border-left: 1px solid #f0edf7;
            display: flex;
            flex-direction: column;
            z-index: 50;
            padding: 20px 0;
        }

        .sidebar-logo {
            text-align: center;
            padding: 0 16px 18px;
            border-bottom: 1px solid #f5f3fa;
        }

        .sidebar-logo h2 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-logo span {
            font-size: 0.68rem;
            color: var(--text-light);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-medium);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-item:hover { background: #f5f3fa; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(124,92,255,0.08), rgba(159,122,254,0.06));
            color: #7c5cff;
            font-weight: 600;
        }

        .nav-item .nav-icon { font-size: 1rem; }

        .sidebar-profile {
            padding: 14px 16px;
            border-top: 1px solid #f5f3fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .profile-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .profile-role {
            font-size: 0.65rem;
            color: var(--text-light);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-right: 220px;
            padding: 24px 28px;
            min-height: 100vh;
            max-width: 1100px;
        }

        /* Header */
        .page-header {
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(124,92,255,0.04), rgba(159,122,254,0.02));
            border-radius: 16px;
            padding: 18px 22px;
        }

        .page-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #4a3d8f;
            margin-bottom: 2px;
        }

        .page-header p {
            font-size: 0.82rem;
            color: var(--text-light);
        }

        .last-update {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Live pulse dot */
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #48bb78;
            position: relative;
            flex-shrink: 0;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #48bb78;
            animation: livePulse 1.8s ease-out infinite;
        }
        @keyframes livePulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3.2); opacity: 0; }
        }

        /* Header layout with mascot */
        .header-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-mascot {
            flex-shrink: 0;
            width: 60px; height: 60px;
            border-radius: 18px;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(124,92,255,0.28);
            animation: bob 3.4s ease-in-out infinite;
        }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .header-text { flex: 1; }

        /* Personal detail chips */
        .personal-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .personal-chip {
            font-size: 0.7rem;
            font-weight: 500;
            color: #5a4a9f;
            background: rgba(124,92,255,0.08);
            padding: 3px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Real-time update toast */
        .live-toast {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%) translateY(140%);
            z-index: 300;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 12px 34px rgba(124,92,255,0.22);
            border: 1px solid #efeafd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 340px;
            transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .live-toast.show { transform: translateX(-50%) translateY(0); }
        .live-toast .toast-ico {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .live-toast .toast-text { font-size: 0.8rem; color: var(--text-dark); font-weight: 500; line-height: 1.4; }
        .live-toast .toast-text small { display: block; font-size: 0.66rem; color: var(--text-muted); font-weight: 400; margin-top: 1px; }

        /* Section Titles */
        .section-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: #7c5cff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title .emoji { font-size: 0.95rem; }

        /* ===== TWO COLUMN LAYOUT ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-grid .full-width {
            grid-column: 1 / -1;
        }

        /* ===== SUBJECTS PROGRESS ===== */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .subject-card {
            background: #fff;
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s;
        }

        .subject-card:hover { transform: translateY(-2px); }

        .subject-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .subject-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subject-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }

        .subject-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .subject-level {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 6px;
            font-weight: 500;
        }

        .level-great { background: rgba(72,187,120,0.1); color: #38a169; }
        .level-good { background: rgba(99,179,237,0.1); color: #3182ce; }
        .level-building { background: rgba(246,173,85,0.1); color: #c05621; }

        .subject-progress-bar {
            height: 7px;
            background: #f0edf7;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .subject-progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .subject-progress-label {
            font-size: 0.72rem;
            color: var(--text-light);
        }

        /* ===== DIFFICULTIES ===== */
        .difficulties-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .difficulty-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
            border-right: 3px solid #f6ad55;
        }

        .difficulty-subject-tag {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(246,173,85,0.1);
            color: #c05621;
            white-space: nowrap;
        }

        .difficulty-text {
            font-size: 0.8rem;
            color: var(--text-medium);
            flex: 1;
        }

        .difficulty-status {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 5px;
            white-space: nowrap;
        }

        .status-working { background: rgba(99,179,237,0.1); color: #3182ce; }
        .status-new { background: rgba(246,173,85,0.1); color: #c05621; }
        .status-improving { background: rgba(72,187,120,0.1); color: #38a169; }

        /* ===== GOALS / MENTORING ===== */
        .goals-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .goal-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
        }

        .goal-checkbox {
            width: 20px; height: 20px;
            border-radius: 6px;
            border: 2px solid #e2e0ee;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .goal-checkbox.done {
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            border-color: #7c5cff;
        }

        .goal-checkbox.done::after {
            content: '✓';
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .goal-content { flex: 1; }

        .goal-text {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .goal-meta {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .goal-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .add-goal-btn {
            font-family: 'Rubik', sans-serif;
            font-size: 0.76rem;
            font-weight: 600;
            color: #7c5cff;
            background: rgba(124,92,255,0.06);
            border: 1px dashed rgba(124,92,255,0.35);
            border-radius: 10px;
            padding: 9px 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .add-goal-btn:hover { background: rgba(124,92,255,0.12); border-style: solid; }

        /* ===== MAPPING / PROFILE ===== */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .profile-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
        }

        .profile-card-label {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .profile-tag {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(124,92,255,0.06);
            color: #5a4a9f;
            font-weight: 500;
        }

        .profile-value {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        /* ===== COMPETENCIES (ACTIVISM) ===== */
        .competencies-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .competency-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .competency-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .competency-label {
            font-size: 0.73rem;
            color: var(--text-medium);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .competency-bar-track {
            height: 5px;
            background: #f0edf7;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .competency-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .competency-descriptor {
            font-size: 0.67rem;
            color: var(--text-light);
            font-style: italic;
        }

        /* ===== VIEWS (home + deep screens) ===== */
        .view { display: none; animation: fadeIn 0.35s ease; }
        .view.active { display: block; }

        .view-back {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'Rubik', sans-serif;
            font-size: 0.8rem; font-weight: 600; color: #7c5cff;
            background: rgba(124,92,255,0.07);
            border: none; border-radius: 10px;
            padding: 7px 14px; margin-bottom: 16px; cursor: pointer;
            transition: background 0.2s;
        }
        .view-back:hover { background: rgba(124,92,255,0.14); }

        .view-head { margin-bottom: 18px; }
        .view-head h1 { font-size: 1.3rem; font-weight: 700; color: #4a3d8f; }
        .view-head p { font-size: 0.82rem; color: var(--text-light); margin-top: 2px; }

        /* ===== HOME: GREETING ===== */
        .greeting {
            background: linear-gradient(135deg, rgba(124,92,255,0.07), rgba(159,122,254,0.03));
            border-radius: 22px;
            padding: 16px 28px;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 18px;
        }
        .greeting-text { flex: 1; }
        .greeting-text h1 { font-size: 1.55rem; font-weight: 800; color: #4a3d8f; }
        .greeting-text p { font-size: 0.88rem; color: var(--text-light); margin-top: 2px; }
        .greeting-robot {
            flex-shrink: 0; width: 120px; height: 120px; object-fit: contain;
            filter: drop-shadow(0 12px 20px rgba(124,92,255,0.28));
            animation: bob 3.6s ease-in-out infinite;
        }

        .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
        .quick-chip {
            display: flex; align-items: center; gap: 7px;
            background: #fff; border-radius: 14px;
            padding: 9px 14px; box-shadow: var(--shadow-sm);
            font-size: 0.8rem; font-weight: 500; color: var(--text-medium);
        }
        .quick-chip .qc-ico {
            width: 26px; height: 26px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem; flex-shrink: 0;
        }
        .quick-chip b { color: var(--text-dark); font-weight: 700; }

        /* ===== HOME SECTION HEADERS ===== */
        .home-section { margin-bottom: 26px; }
        /* 2x2 grid of focus panels below the daily task */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-top: 22px;
        }
        .panel {
            background: #fff;
            border-radius: 22px;
            padding: 20px 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(124,92,255,0.06);
        }
        @media (max-width: 980px) {
            .home-grid { grid-template-columns: 1fr; }
        }
        /* Inner items sit softly inside their panel (no nested-card look) */
        .panel .improve-card,
        .panel .step-card,
        .panel .subject-row,
        .panel .strength-card {
            background: #faf9fe;
            box-shadow: none;
            border: 1px solid rgba(124,92,255,0.05);
        }
        .panel .home-section-head { margin-bottom: 14px; }
        .home-section-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .home-section-head h2 {
            font-size: 1rem; font-weight: 700; color: var(--text-dark);
            display: flex; align-items: center; gap: 8px;
        }
        .see-more-btn {
            font-family: 'Rubik', sans-serif;
            font-size: 0.74rem; font-weight: 600; color: #7c5cff;
            background: transparent; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 3px;
            padding: 4px 6px; border-radius: 8px; transition: background 0.2s;
        }
        .see-more-btn:hover { background: rgba(124,92,255,0.08); }

        /* ===== HERO CARD (primary task) ===== */
        .hero-card {
            position: relative; overflow: hidden;
            background: linear-gradient(120deg, #6d4dff 0%, #8b63ff 55%, #9f7afe 100%);
            border-radius: 26px;
            padding: 22px 32px;
            color: #fff;
            box-shadow: 0 18px 42px rgba(124,92,255,0.34);
            display: flex; align-items: center; gap: 18px; min-height: 172px;
        }
        .hero-card .spark { position: absolute; color: rgba(255,255,255,0.55); z-index: 1; }
        .hero-body { flex: 1; position: relative; z-index: 2; }
        .hero-eyebrow { font-size: 0.82rem; font-weight: 600; opacity: 0.92; display: flex; align-items: center; gap: 6px; }
        .hero-title { font-size: 1.55rem; font-weight: 800; margin: 8px 0 6px; line-height: 1.32; }
        .hero-subtitle { font-size: 0.86rem; opacity: 0.92; margin-bottom: 16px; }
        .hero-illu {
            flex-shrink: 0; position: relative; z-index: 2;
            width: 168px; height: 150px;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-illu .illu-circle {
            width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle at 38% 30%, rgba(255,255,255,0.34), rgba(255,255,255,0.06));
            display: flex; align-items: center; justify-content: center;
            font-size: 3.8rem;
            box-shadow: inset 0 0 32px rgba(255,255,255,0.2);
        }
        .hero-illu .illu-float { position: absolute; font-size: 1.5rem; animation: bob 3s ease-in-out infinite; }
        .hero-cta {
            font-family: 'Rubik', sans-serif;
            font-size: 0.9rem; font-weight: 700; color: #7c5cff;
            background: #fff; border: none; border-radius: 14px;
            padding: 11px 26px; cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            transition: transform 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .hero-cta:hover { transform: translateY(-2px); }

        /* ===== STRENGTH CARDS ===== */
        .strengths-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .strength-card {
            background: #fff; border-radius: 18px;
            padding: 18px 14px; box-shadow: var(--shadow-sm);
            text-align: center; transition: transform 0.2s;
        }
        .strength-card:hover { transform: translateY(-3px); }
        .strength-ico {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; margin: 0 auto 12px;
        }
        .strength-name { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); }
        .strength-desc { font-size: 0.74rem; color: var(--text-light); margin-top: 5px; line-height: 1.45; }

        /* ===== IMPROVE CARDS (what helps me grow) ===== */
        .improve-list { display: flex; flex-direction: column; gap: 10px; }
        .improve-card {
            background: #fff; border-radius: 18px;
            padding: 16px 18px; box-shadow: var(--shadow-sm);
        }
        .improve-top { display: flex; align-items: center; gap: 14px; }
        .improve-ico {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.7rem; flex-shrink: 0;
        }
        .improve-main { flex: 1; }
        .improve-title { font-size: 0.93rem; font-weight: 700; color: var(--text-dark); margin-bottom: 9px; }
        .improve-sub { font-size: 0.74rem; color: var(--text-light); margin-top: 2px; }
        .improve-toggle {
            font-family: 'Rubik', sans-serif;
            font-size: 0.74rem; font-weight: 600; color: #2f855a;
            background: rgba(72,187,120,0.14); border: none;
            border-radius: 999px; padding: 6px 14px; cursor: pointer;
            white-space: nowrap; transition: background 0.2s;
        }
        .improve-toggle:hover { background: rgba(72,187,120,0.24); }
        .improve-tip {
            font-size: 0.78rem; color: var(--text-medium); line-height: 1.5;
            margin-top: 0; max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.3s ease;
        }
        .improve-card.open .improve-tip { max-height: 120px; margin-top: 12px; }

        /* ===== STEPS (goals on home) ===== */
        .steps-list { display: flex; flex-direction: column; gap: 10px; }
        .step-card {
            background: #fff; border-radius: 16px;
            padding: 14px 18px; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 12px;
        }
        .step-grip {
            color: #d4cdec; font-size: 1rem; letter-spacing: -3px;
            cursor: grab; flex-shrink: 0; user-select: none;
        }

    <script>
        // ================================================
        // LOAD DASHBOARD FROM MAPPING DATA (via AI)
        // ================================================
        let currentData = null;

        async function loadDashboard() {
            const stored = localStorage.getItem('mapping_results');
            if (!stored) {
                document.getElementById('dashboardLoading').innerHTML = `
                    <div style="font-size:48px;margin-bottom:16px;">📋</div>
                    <div style="font-size:18px;font-weight:700;color:#3a3360;margin-bottom:12px;">עדיין אין נתוני מיפוי</div>
                    <div style="font-size:14px;color:#9a93b5;margin-bottom:24px;">כדי לראות את הדשבורד האישי, צריך קודם למלא את השאלון</div>
                    <a href="/learner-mapping/" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#7c5cff,#9f7afe);color:#fff;border-radius:14px;font-weight:700;text-decoration:none;">למילוי השאלון →</a>
                `;
                return;
            }

            const mappingData = JSON.parse(stored);
            const name = mappingData.student_name || 'תלמיד/ה';

            // Update sidebar with real name
            document.getElementById('sidebarAvatar').textContent = name[0];
            document.getElementById('sidebarName').textContent = name;

            // Check cache - use stored dashboard if mapping data hasn't changed
            const cacheKey = 'dashboard_cache';
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const cacheObj = JSON.parse(cached);
                    if (cacheObj.sourceHash === stored) {
                        currentData = cacheObj.data;
                        renderDashboard(cacheObj.data);
                        return;
                    }
                } catch (e) { /* cache corrupt, regenerate */ }
            }

            try {
                const resp = await fetch('/api/generate-dashboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_name: name, scores: mappingData.scores })
                });

                if (!resp.ok) throw new Error('API error');
                const data = await resp.json();
                currentData = data;

                // Cache the result
                localStorage.setItem(cacheKey, JSON.stringify({ sourceHash: stored, data }));

                renderDashboard(data);

        const STRENGTH_ICONS = {
            'סקרנות': '🔬', 'התמדה': '🎯', 'שיתוף פעולה': '🤝', 'יצירתיות': '🎨',
            'חשיבה': '💡', 'תקשורת': '🗣️', 'יוזמה': '🚀', 'טכנולוגיה': '💻',
            'אחריות': '🛡️', 'דמיון': '✨', 'מנהיגות': '🌟', 'ריכוז': '🎧'
        };
        function strengthIcon(name) {
            for (const key in STRENGTH_ICONS) if (name.includes(key)) return STRENGTH_ICONS[key];
            if (name.includes('שתף') || name.includes('עזר') || name.includes('ביחד')) return '🤝';
            if (name.includes('להתחיל') || name.includes('לסיים') || name.includes('משימ')) return '🎯';

            if (name.includes('רצון') || name.includes('מוטיב')) return '🌟';
            return '⭐';
        }
        function strengthLine(name) {
            if (name.includes('סקרנות') || name.includes('לגלות') || name.includes('לנסות')) return 'אוהב לגלות דברים חדשים';
            if (name.includes('התמדה')) return 'ממשיך גם כשקצת מאתגר';
            if (name.includes('שתף') || name.includes('עזר') || name.includes('ביחד')) return 'קל לך לעבוד ולשתף עם אחרים';
            if (name.includes('להתחיל') || name.includes('לסיים') || name.includes('משימ')) return 'מתחיל משימות ומסיים אותן';
            if (name.includes('יצירת')) return 'חושב על רעיונות מקוריים';
            if (name.includes('טכנולוג')) return 'מסתדר מצוין עם כלים דיגיטליים';
            if (name.includes('תקשורת')) return 'יודע להביע את עצמך';
            if (name.includes('ריכוז')) return 'מצליח להתמקד במשימה';
            if (name.includes('רצון') || name.includes('מוטיב')) return 'יש לך רצון לנסות ולהתקדם';
            return 'זה אחד הכוחות הגדולים שלך';
        }
        // Positive reframing of a difficulty into a growth title + supportive how-to
        function improveTitle(d) {
            const t = (d.text || '').toLowerCase();
            if (t.includes('ריכוז')) return 'לשמור על ריכוז לאורך זמן';
            if (t.includes('טכנולוג') || t.includes('דיגיטל')) return 'להרגיש בטוח יותר עם כלים דיגיטליים';
            if (t.includes('ארגון') || t.includes('תכנון')) return 'לארגן את המידע בצורה נוחה';
            return d.text;
        }
        function improveHow(d) {
            const t = (d.text || '').toLowerCase();
            if (t.includes('ריכוז')) return 'נעבוד ביחידות קצרות עם הפסקות קטנות בין משימה למשימה.';
            if (t.includes('טכנולוג') || t.includes('דיגיטל')) return 'נתחיל ממשימות קצרות עם כלי אחד בכל פעם, בלי לחץ.';
            if (t.includes('ארגון') || t.includes('תכנון')) return 'נשתמש ברשימה קצרה של צעדים לפני שמתחילים.';
            return 'נתקדם צעד אחד קטן בכל פעם, ויובי איתך בדרך.';
        }
        function avgProgress(subjects) {
            if (!subjects.length) return 0;
            return Math.round(subjects.reduce((a, s) => a + (s.progress || 0), 0) / subjects.length);
        }
        function topStrengthLabel(data) {
            const comps = data.competencies || [];
            if (comps.length) return [...comps].sort((a, b) => b.value - a.value)[0].label;
            return (data.mapping && data.mapping.strengths && data.mapping.strengths[0]) || 'סקרנות';
        }
        // Hero illustration + subtitle derived from the focus subject
        function heroSubtitle(name) {
            if (name.includes('מדע')) return 'חקר קצר על צמחים והסביבה';
            if (name.includes('מתמט') || name.includes('חשבון')) return 'משחק מספרים קצר וכיפי';
            if (name.includes('עבר') || name.includes('שפה')) return 'סיפור קצר וכתיבה יצירתית';
            if (name.includes('מחשב') || name.includes('טכנולוג')) return 'פרויקט דיגיטלי קטן';
            if (name.includes('אנגל')) return 'משחק מילים קצר באנגלית';
            return 'משימה קצרה שמתאימה בדיוק לך';
        }
        function heroIllu(name) {
            if (name.includes('מדע')) return '🔬';
            if (name.includes('מתמט') || name.includes('חשבון')) return '🔢';
            if (name.includes('עבר') || name.includes('שפה')) return '📖';
            if (name.includes('מחשב') || name.includes('טכנולוג')) return '💻';
            if (name.includes('אנגל')) return '🔤';
            return '🚀';
        }
        function heroFloats(name) {
            if (name.includes('מדע')) return ['🌱', '🦋', '✨'];
            if (name.includes('מתמט') || name.includes('חשבון')) return ['➕', '⭐', '✨'];
            if (name.includes('עבר') || name.includes('שפה')) return ['✏️', '💬', '✨'];
            return ['⭐', '✨', '💜'];
        }
        // Circular icon background colors for strength cards (rotating soft tones)
        const STRENGTH_BG = ['rgba(246,173,85,0.20)', 'rgba(72,187,120,0.18)', 'rgba(124,92,255,0.18)'];
        // Illustrated icon + soft circle color for "what helps me grow" cards
        function improveVisual(d) {
            const t = (d.text || '').toLowerCase();
            if (t.includes('ריכוז')) return { emoji: '⏱️', bg: 'rgba(72,187,120,0.16)' };
            if (t.includes('טכנולוג') || t.includes('דיגיטל')) return { emoji: '💻', bg: 'rgba(99,179,237,0.18)' };
            if (t.includes('ארגון') || t.includes('תכנון')) return { emoji: '🗂️', bg: 'rgba(124,92,255,0.16)' };
            return { emoji: '🌱', bg: 'rgba(246,173,85,0.18)' };
        }

            el.innerHTML = `
                <button class="view-back" data-goto="home">→ חזרה לדשבורד</button>
                <div class="view-head"><h1>🧭 איך אני לומד</h1><p>הדרך שמתאימה לי ללמוד הכי טוב</p></div>

                <div class="lp-card fade-in">
                    <h3>🎨 סגנון הלמידה שלי</h3>
                    <div style="font-size:0.85rem;color:var(--text-medium);line-height:1.5">${m.learningStyle || 'למידה בקצב אישי עם הרבה דוגמאות'}</div>
                </div>
                <div class="lp-card fade-in">
                    <h3>✅ מה עוזר לי ללמוד</h3>
                    <div class="lp-list">${helps.map(h => `<div class="lp-row"><span class="lp-dot" style="background:#48bb78"></span> ${h}</div>`).join('')}</div>
                </div>
                <div class="lp-card fade-in">
                    <h3>🌧️ מה פחות עוזר לי</h3>
                    <div class="lp-list">
                        <div class="lp-row"><span class="lp-dot" style="background:#f6ad55"></span> משימות ארוכות מדי</div>
                        <div class="lp-row"><span class="lp-dot" style="background:#f6ad55"></span> הרבה טקסט בבת אחת</div>
                    </div>
                </div>
                <div class="lp-card fade-in">
                    <h3>🌟 הסביבה שמתאימה לי</h3>
                    <div style="font-size:0.85rem;color:var(--text-medium);line-height:1.5">${m.environment || 'סביבה שקטה ונוחה'}</div>
                </div>
            `;
            el.querySelector('[data-goto]').addEventListener('click', () => switchView('home'));
        }

        // ================================================
        // VIEW SWITCHING + NAV
        // ================================================
        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const target = document.getElementById('view-' + view);
            if (target) target.classList.add('active');
            document.querySelectorAll('.nav-item[data-view]').forEach(n => {
                n.classList.toggle('active', n.dataset.view === view);
            });
            const mc = document.getElementById('mainContent');
            if (mc) mc.scrollTo ? mc.scrollTo(0, 0) : (mc.scrollTop = 0);
            window.scrollTo(0, 0);
        }

        function setupNav() {
            document.querySelectorAll('.nav-item[data-view]').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchView(item.dataset.view);
                });
            });
        }



        function animateBars(els) {
            requestAnimationFrame(() => {
                setTimeout(() => {
                    els.forEach(el => { el.style.width = el.dataset.target + '%'; });
                }, 120);
            });
        }

        // ================================================
        // LIVE TOAST (real-time feel)
        // ================================================
        let toastTimer = null;
        function showLiveToast(text, sub, ico) {
            const toast = document.getElementById('liveToast');
            const txt = document.getElementById('toastText');
            toast.querySelector('.toast-ico').textContent = ico || '📡';
            txt.innerHTML = `${text}${sub ? `<small>${sub}</small>` : ''}`;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 4200);
        }

        // ================================================
        // YUBI CHAT (text + voice/Jarvis demo)
        // ================================================
        const YUBI_SVG = `<svg viewBox="0 0 44 44" width="18" height="18" fill="none">
            <rect x="9" y="15" width="26" height="21" rx="6" fill="#fff"/>
            <rect x="15" y="21" width="5" height="5" rx="2" fill="#7c5cff"/>
            <rect x="24" y="21" width="5" height="5" rx="2" fill="#7c5cff"/>
            <path d="M18 30 Q22 33 26 30" stroke="#22d3ee" stroke-width="2.6" fill="none" stroke-linecap="round"/>
        </svg>`;

        let chatSeeded = false;
        let voiceTimers = [];

        function firstName() {
            return currentData ? currentData.name.split(' ')[0] : 'חבר';
        }

        // Personalized reply that proves Yubi knows the kid
        function generateReply(msg) {
            const d = currentData;
            if (!d) return 'בוא נתחיל! 😊';
            const m = (msg || '').toLowerCase();
            const name = firstName();
            const interests = d.mapping.interests;
            const strengths = d.mapping.strengths;
            const subjects = d.subjects;
            const diffs = d.difficulties;
            const best = [...subjects].sort((a, b) => b.progress - a.progress)[0];

            if (/(שלום|היי|הי |מה נשמע|מה קורה|בוקר טוב|היי)/.test(m))
                return `היי ${name}! 😊 ראיתי שאתה ממש מתקדם ב${best.name} ושאתה אוהב ${interests[0]}. במה אפשר לעזור היום?`;
            if (/(חוזק|טוב ב|במה אני טוב|מצטיין|מה אני יודע)/.test(m))
                return `אתה ממש חזק ב${best.name} (${best.level})! 💪 והחוזקות הבולטות שלך הן ${strengths.slice(0,2).join(' ו')}. תמשיך ככה!`;
            if (/(מתמטיק|חשבון|שברים|כפל)/.test(m)) {
                const md = diffs.find(x => x.subject === 'מתמטיקה');
                return md ? `במתמטיקה אנחנו עכשיו על "${md.text}" 🔢. בוא נפרק את זה לצעדים קטנים — אני בטוח שתצליח!`
                          : `מתמטיקה זה תחום שאתה מתקדם בו יפה! רוצה תרגול קטן ביחד?`;
            }
            if (/(קשה|לא מבין|תקוע|עזרה|לא מצליח|מתקשה)/.test(m))
                return `אל דאגה ${name} 🌟 ראיתי שאתה עובד על "${diffs[0].text}". זה לגמרי טבעי שלוקח זמן. בוא ננסה יחד צעד קטן אחד?`;
            if (/(משעמם|לא בא לי|אין חשק|לא כיף)/.test(m))
                return `מבין אותך 😄 אולי ננסה לחבר את הלמידה ל${interests[0]} או ${interests[1]}? ככה זה הרבה יותר כיף בשבילך!`;
            if (/(יעד|מטרה|מטרות|רוצה להשיג)/.test(m)) {
                const g = d.goals.find(x => !x.done);
                return g ? `היעד הקרוב שלך הוא: "${g.text}" 🎯. אני כאן ללוות אותך עד שתשיג אותו!`
                         : `כל הכבוד — סיימת את כל היעדים! 🎉 רוצה שנוסיף יעד חדש?`;
            }
            if (/(תודה|מגניב|אחלה|יאללה|מעולה)/.test(m))
                return `בכיף ${name}! 💜 אני תמיד כאן בשבילך.`;
            return `מעניין! 🤔 דרך אגב, ראיתי שאתה אוהב ${interests[Math.floor(Math.random() * interests.length)]} — נוכל לשלב את זה בלמידה. רוצה לנסות?`;
        }

        function addMsg(text, who) {
            const body = document.getElementById('chatBody');
            const row = document.createElement('div');
            row.className = 'msg-row ' + who;
            row.innerHTML = (who === 'bot' ? `<div class="msg-ava">${YUBI_SVG}</div>` : '') +
                `<div class="bubble">${text}</div>`;
            body.appendChild(row);
            body.scrollTop = body.scrollHeight;
        }

        function botReply(text) {
            const body = document.getElementById('chatBody');
            const typing = document.createElement('div');
            typing.className = 'msg-row bot';
            typing.innerHTML = `<div class="msg-ava">${YUBI_SVG}</div><div class="typing"><span></span><span></span><span></span></div>`;
            body.appendChild(typing);
            body.scrollTop = body.scrollHeight;
            setTimeout(() => {
                typing.remove();
                addMsg(text, 'bot');
            }, 850 + Math.min(text.length * 12, 900));
        }

        function renderSuggestions() {
            const sug = document.getElementById('chatSuggestions');
            const chips = ['במה אני טוב? 💪', 'עזור לי במתמטיקה 🔢', 'מה היעדים שלי? 🎯', 'קצת משעמם לי 😅'];
            sug.innerHTML = chips.map(c => `<button type="button">${c}</button>`).join('');
            sug.querySelectorAll('button').forEach(b => {
                b.addEventListener('click', () => sendUserMsg(b.textContent));
            });
        }

        function sendUserMsg(text) {
            if (!text.trim()) return;
            addMsg(text, 'user');
            const reply = generateReply(text);
            botReply(reply);
        }

        function resetChat() {
            const body = document.getElementById('chatBody');
            if (body) body.innerHTML = '';
            chatSeeded = false;
            // reset voice stage
            clearVoice();
        }

        function seedChat() {
            if (chatSeeded) return;
            chatSeeded = true;
            addMsg(generateReply('שלום'), 'bot');
            renderSuggestions();
        }

        // ---- Voice (Jarvis) ----
        function orbState(s) {
            const orb = document.getElementById('jarvisOrb');
            orb.className = 'jarvis-orb ' + (s === 'idle' ? 'idle' : s === 'listening' ? 'active listening' : 'active');
        }
        function clearVoice() {
            voiceTimers.forEach(t => clearTimeout(t));
            voiceTimers = [];
            const mic = document.getElementById('micBtn');
            if (mic) mic.classList.remove('recording');
            orbState('idle');
            const cap = document.getElementById('voiceCaption');
            if (cap) cap.textContent = 'לחצו על המיקרופון כדי לדבר עם יובי 🎤';
        }
        function startVoiceDemo() {
            clearVoice();
            const cap = document.getElementById('voiceCaption');
            const mic = document.getElementById('micBtn');
            mic.classList.add('recording');
            orbState('listening');
            cap.textContent = 'מקשיב לך... 🎧';
            voiceTimers.push(setTimeout(() => {
                orbState('idle');
                mic.classList.remove('recording');
                cap.textContent = 'חושב... 💭';
            }, 2000));
            voiceTimers.push(setTimeout(() => {
                const reply = generateReply('שלום');
                orbState('speaking');
                cap.textContent = '🔊 ' + reply;
            }, 2900));
            voiceTimers.push(setTimeout(() => {
                orbState('idle');
                document.getElementById('voiceCaption').textContent = 'לחצו שוב כדי לדבר עם יובי 🎤';
            }, 7500));
        }

        // ---- Open / close / mode ----
        function openChat() {
            document.getElementById('yubiChat').classList.add('open');
            document.getElementById('yubiFab').classList.add('hidden');
            seedChat();
        }
        function closeChat() {
            document.getElementById('yubiChat').classList.remove('open');
            document.getElementById('yubiFab').classList.remove('hidden');
            clearVoice();
        }

        document.getElementById('yubiFab').addEventListener('click', openChat);
        document.getElementById('yubiClose').addEventListener('click', closeChat);
        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            sendUserMsg(input.value);
            input.value = '';
        });
        document.querySelectorAll('.mode-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const chat = document.getElementById('yubiChat');
                if (btn.dataset.mode === 'voice') {
                    chat.classList.add('voice');
                    clearVoice();
                } else {
                    chat.classList.remove('voice');
                    clearVoice();
                }
            });
        });
        document.getElementById('micBtn').addEventListener('click', startVoiceDemo);

        // ================================================
        // EVENTS
        // ================================================

        // Initial render from mapping data
        loadDashboard();

        // Simulate a live update shortly after load (demo "alive" feel)
        setTimeout(() => {
            if (currentData) {
                showLiveToast('הכל מוכן! זה המרחב האישי שלך ביובי 💜', 'יובי כאן לעזור לך בכל שלב', '🚀');
            }
        }, 3500);
    </script>
</body>
</html>
