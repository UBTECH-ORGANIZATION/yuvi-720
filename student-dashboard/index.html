<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדשבורד שלי - YuviLab 720</title>
    <link rel="stylesheet" href="/shared/theme.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rubik', 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            direction: rtl;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 220px;
            height: 100vh;
            background: #fff;
            border-left: 1px solid #f0edf7;
            display: flex;
            flex-direction: column;
            z-index: 50;
            padding: 20px 0;
        }

        .sidebar-logo {
            text-align: center;
            padding: 0 16px 18px;
            border-bottom: 1px solid #f5f3fa;
        }

        .sidebar-logo h2 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-logo span {
            font-size: 0.68rem;
            color: var(--text-light);
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-medium);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-item:hover { background: #f5f3fa; }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(124,92,255,0.08), rgba(159,122,254,0.06));
            color: #7c5cff;
            font-weight: 600;
        }

        .nav-item .nav-icon { font-size: 1rem; }

        .sidebar-profile {
            padding: 14px 16px;
            border-top: 1px solid #f5f3fa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .profile-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .profile-role {
            font-size: 0.65rem;
            color: var(--text-light);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            /* No sidebar — center the content across the full width. */
            padding: 24px 28px;
            min-height: 100vh;
            max-width: 1180px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            margin-bottom: 20px;
            background: linear-gradient(135deg, rgba(124,92,255,0.04), rgba(159,122,254,0.02));
            border-radius: 16px;
            padding: 18px 22px;
        }

        .page-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #4a3d8f;
            margin-bottom: 2px;
        }

        .page-header p {
            font-size: 0.82rem;
            color: var(--text-light);
        }

        .last-update {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Live pulse dot */
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #48bb78;
            position: relative;
            flex-shrink: 0;
        }
        .live-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #48bb78;
            animation: livePulse 1.8s ease-out infinite;
        }
        @keyframes livePulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3.2); opacity: 0; }
        }

        /* Header layout with mascot */
        .header-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header-mascot {
            flex-shrink: 0;
            width: 60px; height: 60px;
            border-radius: 18px;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(124,92,255,0.28);
            animation: bob 3.4s ease-in-out infinite;
        }
        @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .header-text { flex: 1; }

        /* Personal detail chips */
        .personal-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .personal-chip {
            font-size: 0.7rem;
            font-weight: 500;
            color: #5a4a9f;
            background: rgba(124,92,255,0.08);
            padding: 3px 10px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Real-time update toast */
        .live-toast {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%) translateY(140%);
            z-index: 300;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 12px 34px rgba(124,92,255,0.22);
            border: 1px solid #efeafd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 340px;
            transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .live-toast.show { transform: translateX(-50%) translateY(0); }
        .live-toast .toast-ico {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .live-toast .toast-text { font-size: 0.8rem; color: var(--text-dark); font-weight: 500; line-height: 1.4; }
        .live-toast .toast-text small { display: block; font-size: 0.66rem; color: var(--text-muted); font-weight: 400; margin-top: 1px; }

        /* Section Titles */
        .section-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: #7c5cff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title .emoji { font-size: 0.95rem; }

        /* ===== TWO COLUMN LAYOUT ===== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-grid .full-width {
            grid-column: 1 / -1;
        }

        /* ===== SUBJECTS PROGRESS ===== */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .subject-card {
            background: #fff;
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s;
        }

        .subject-card:hover { transform: translateY(-2px); }

        .subject-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .subject-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subject-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }

        .subject-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .subject-level {
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 6px;
            font-weight: 500;
        }

        .level-great { background: rgba(72,187,120,0.1); color: #38a169; }
        .level-good { background: rgba(99,179,237,0.1); color: #3182ce; }
        .level-building { background: rgba(246,173,85,0.1); color: #c05621; }

        .subject-progress-bar {
            height: 7px;
            background: #f0edf7;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .subject-progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .subject-progress-label {
            font-size: 0.72rem;
            color: var(--text-light);
        }

        /* ===== DIFFICULTIES ===== */
        .difficulties-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .difficulty-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
            border-right: 3px solid #f6ad55;
        }

        .difficulty-subject-tag {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(246,173,85,0.1);
            color: #c05621;
            white-space: nowrap;
        }

        .difficulty-text {
            font-size: 0.8rem;
            color: var(--text-medium);
            flex: 1;
        }

        .difficulty-status {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 5px;
            white-space: nowrap;
        }

        .status-working { background: rgba(99,179,237,0.1); color: #3182ce; }
        .status-new { background: rgba(246,173,85,0.1); color: #c05621; }
        .status-improving { background: rgba(72,187,120,0.1); color: #38a169; }

        /* ===== CURRICULUM (progress vs syllabus) ===== */
        .curriculum-block {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #e7e2f5;
        }
        .curriculum-title {
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--text-medium);
            margin-bottom: 8px;
        }
        .curriculum-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .curriculum-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.76rem;
        }
        .curriculum-mark {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.72rem;
            flex-shrink: 0;
        }
        .curriculum-topic { flex: 1; color: var(--text-medium); }
        .curriculum-status {
            font-size: 0.66rem;
            padding: 1px 7px;
            border-radius: 5px;
            white-space: nowrap;
        }
        .curriculum-item.curr-done .curriculum-mark { background: rgba(72,187,120,0.15); color: #38a169; }
        .curriculum-item.curr-done .curriculum-status { background: rgba(72,187,120,0.1); color: #38a169; }
        .curriculum-item.curr-current .curriculum-mark { background: rgba(124,92,255,0.15); color: #7c5cff; }
        .curriculum-item.curr-current .curriculum-status { background: rgba(124,92,255,0.1); color: #7c5cff; }
        .curriculum-item.curr-current .curriculum-topic { font-weight: 700; color: var(--text-dark); }
        .curriculum-item.curr-upcoming .curriculum-mark { background: #f0edf8; color: #b6abdd; }
        .curriculum-item.curr-upcoming .curriculum-status { background: #f4f2fb; color: #9a93b5; }
        .curriculum-item.curr-upcoming .curriculum-topic { color: var(--text-light); }

        /* ===== SUBJECTS (deep view, rich cards) ===== */
        .subjects-grid-rich {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }
        @media (max-width: 880px) { .subjects-grid-rich { grid-template-columns: 1fr; } }
        .subj-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px 22px 18px;
            box-shadow: 0 6px 22px rgba(76,58,160,0.08);
            border: 1px solid #f0edf8;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .subj-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(76,58,160,0.14); }
        .subj-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
        .subj-id { display: flex; align-items: center; gap: 12px; }
        .subj-ico {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }
        .subj-name { font-size: 1.05rem; font-weight: 700; color: var(--text-dark); line-height: 1.2; }
        .subj-lessons { font-size: 0.72rem; color: var(--text-light); margin-top: 3px; }
        .subj-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.68rem; font-weight: 600;
            padding: 5px 10px; border-radius: 999px;
            white-space: nowrap; flex-shrink: 0;
        }
        .subj-badge .bdot { width: 7px; height: 7px; border-radius: 50%; }
        .subj-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .subj-bar { flex: 1; height: 9px; background: #f0edf7; border-radius: 6px; overflow: hidden; }
        .subj-fill { height: 100%; border-radius: 6px; width: 0; transition: width 0.9s cubic-bezier(0.18,0.89,0.32,1.1); }
        .subj-pct { font-size: 0.82rem; font-weight: 700; color: var(--text-medium); min-width: 38px; text-align: left; }
        .subj-next-label { font-size: 0.72rem; font-weight: 700; color: var(--text-light); margin-bottom: 9px; }
        .subj-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
        .subj-item {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 4px; font-size: 0.86rem;
            border-bottom: 1px solid #f6f4fb;
        }
        .subj-item:last-child { border-bottom: none; }
        .subj-mark {
            width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
            border: 2px solid #e4dff2; background: #fff; color: transparent;
        }
        .subj-topic { color: var(--text-medium); flex: 1; }
        .subj-item.done .subj-topic { color: var(--text-dark); }
        .subj-item.upcoming .subj-topic { color: var(--text-light); }
        .subj-item.current .subj-topic { font-weight: 700; color: var(--text-dark); }
        .subj-cta {
            margin-top: auto;
            border: none; cursor: pointer;
            width: 100%; padding: 12px;
            border-radius: 14px;
            font-family: 'Rubik', sans-serif; font-size: 0.86rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: filter 0.2s, transform 0.15s;
        }
        .subj-cta:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* ===== SUBJECTS carousel (one subject in focus) ===== */
        .subj-chips {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center;
            margin-bottom: 22px;
        }
        .subj-chip {
            display: inline-flex; align-items: center; gap: 7px;
            border: 1.5px solid #ece8f6; background: #fff;
            color: var(--text-medium);
            font-family: 'Rubik', sans-serif; font-size: 0.82rem; font-weight: 600;
            padding: 8px 14px; border-radius: 999px; cursor: pointer;
            transition: all 0.18s;
        }
        .subj-chip:hover { border-color: #d7cffa; transform: translateY(-1px); }
        .subj-chip .chip-ico { font-size: 0.95rem; }
        .subj-chip.active { color: #fff; border-color: transparent; box-shadow: 0 6px 16px rgba(124,92,255,0.28); }
        .subj-carousel {
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .subj-arrow {
            width: 50px; height: 50px; flex-shrink: 0;
            border-radius: 50%; border: none; cursor: pointer;
            background: #fff; color: #7c5cff;
            box-shadow: 0 6px 18px rgba(76,58,160,0.12);
            font-size: 1.4rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.18s;
        }
        .subj-arrow:hover { background: #7c5cff; color: #fff; transform: scale(1.08); }
        .subj-arrow:disabled { opacity: 0.35; cursor: default; transform: none; background: #fff; color: #b6abdd; }
        /* Coverflow: center card in focus, neighbours peek smaller on each side */
        .subj-coverflow {
            position: relative; flex: 1; min-width: 0;
            display: flex; align-items: center; justify-content: center;
            gap: 0; overflow: hidden; padding: 14px 0;
        }
        .subj-coverflow.anim-next { animation: subjSlideNext 0.4s cubic-bezier(.22,.9,.3,1); }
        .subj-coverflow.anim-prev { animation: subjSlidePrev 0.4s cubic-bezier(.22,.9,.3,1); }
        @keyframes subjSlideNext {
            from { opacity: 0.35; transform: translateX(46px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes subjSlidePrev {
            from { opacity: 0.35; transform: translateX(-46px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .subj-slide {
            flex: 0 0 auto; width: 430px; max-width: 80%;
            transition: transform 0.38s cubic-bezier(.22,.9,.3,1), opacity 0.38s ease;
        }
        .subj-slide.center { transform: scale(1); opacity: 1; z-index: 3; }
        .subj-slide.side {
            opacity: 0.55; cursor: pointer; z-index: 1;
            filter: saturate(0.85);
        }
        .subj-slide.side.prev { transform: scale(0.82) translateX(-26%); }
        .subj-slide.side.next { transform: scale(0.82) translateX(26%); }
        .subj-slide.side:hover { opacity: 0.85; }
        .subj-slide.side.prev:hover { transform: scale(0.86) translateX(-22%); }
        .subj-slide.side.next:hover { transform: scale(0.86) translateX(22%); }
        .subj-slide.center .subj-card { padding: 24px 26px 22px; }
        .subj-slide.center .subj-ico { width: 54px; height: 54px; font-size: 1.7rem; }
        .subj-slide.center .subj-name { font-size: 1.2rem; }
        .subj-slide.center .subj-item { font-size: 0.92rem; padding: 9px 4px; }
        .subj-slide.side .subj-cta { pointer-events: none; }
        .subj-dots { display: flex; justify-content: center; gap: 7px; margin-top: 18px; }
        .subj-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd4f5; cursor: pointer; transition: all 0.2s; }
        .subj-dot.active { width: 22px; border-radius: 999px; background: #7c5cff; }

        /* ===== GOALS / MENTORING ===== */
        .goals-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .goal-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #fff;
            border-radius: 10px;
            padding: 10px 14px;
            box-shadow: var(--shadow-sm);
        }

        .goal-checkbox {
            width: 20px; height: 20px;
            border-radius: 6px;
            border: 2px solid #e2e0ee;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .goal-checkbox.done {
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            border-color: #7c5cff;
        }

        .goal-checkbox.done::after {
            content: '✓';
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .goal-content { flex: 1; }

        .goal-text {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .goal-meta {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .goal-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .goal-source {
            font-size: 0.66rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .goal-source.gsrc-mentor { background: rgba(124,92,255,0.12); color: #6b46c1; }
        .goal-source.gsrc-mapping { background: rgba(99,179,237,0.12); color: #3182ce; }
        .goal-source.gsrc-self { background: rgba(246,173,85,0.14); color: #c05621; }
        .goal-edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 4px;
            opacity: 0.55;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .goal-edit-btn:hover { opacity: 1; }
        .goal-add {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .goal-add-input {
            flex: 1;
            border: 1.5px solid #e2e0ee;
            border-radius: 10px;
            padding: 9px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .goal-add-input:focus { border-color: #7c5cff; }
        .goal-add-btn {
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 9px 16px;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.15s;
        }
        .goal-add-btn:hover { transform: translateY(-1px); }

        .goal-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .add-goal-btn {
            font-family: 'Rubik', sans-serif;
            font-size: 0.76rem;
            font-weight: 600;
            color: #7c5cff;
            background: rgba(124,92,255,0.06);
            border: 1px dashed rgba(124,92,255,0.35);
            border-radius: 10px;
            padding: 9px 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .add-goal-btn:hover { background: rgba(124,92,255,0.12); border-style: solid; }

        /* ===== MAPPING / PROFILE ===== */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .profile-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
        }

        .profile-card-label {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .profile-tag {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(124,92,255,0.06);
            color: #5a4a9f;
            font-weight: 500;
        }

        .profile-value {
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        /* ===== COMPETENCIES (ACTIVISM) ===== */
        .competencies-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .competency-card {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }

        .competency-icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .competency-label {
            font-size: 0.73rem;
            color: var(--text-medium);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .competency-bar-track {
            height: 5px;
            background: #f0edf7;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .competency-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .competency-descriptor {
            font-size: 0.67rem;
            color: var(--text-light);
            font-style: italic;
        }

        /* ===== VIEWS (home + deep screens) ===== */
        .view { display: none; animation: fadeIn 0.35s ease; }
        .view.active { display: block; }

        .view-back {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'Rubik', sans-serif;
            font-size: 0.8rem; font-weight: 600; color: #7c5cff;
            background: rgba(124,92,255,0.07);
            border: none; border-radius: 10px;
            padding: 7px 14px; margin-bottom: 16px; cursor: pointer;
            transition: background 0.2s;
        }
        .view-back:hover { background: rgba(124,92,255,0.14); }

        .view-head { margin-bottom: 18px; }
        .view-head h1 { font-size: 1.3rem; font-weight: 700; color: #4a3d8f; }
        .view-head p { font-size: 0.82rem; color: var(--text-light); margin-top: 2px; }

        /* ===== HOME: GREETING ===== */
        .greeting {
            background: linear-gradient(135deg, rgba(124,92,255,0.07), rgba(159,122,254,0.03));
            border-radius: 22px;
            padding: 16px 28px;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 18px;
        }
        .greeting-text { flex: 1; }
        .greeting-text h1 { font-size: 1.55rem; font-weight: 800; color: #4a3d8f; }
        .greeting-text p { font-size: 0.88rem; color: var(--text-light); margin-top: 2px; }
        .greeting-robot {
            flex-shrink: 0; width: 120px; height: 120px; object-fit: contain;
            filter: drop-shadow(0 12px 20px rgba(124,92,255,0.28));
            animation: bob 3.6s ease-in-out infinite;
        }

        .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
        .quick-chip {
            display: flex; align-items: center; gap: 7px;
            background: #fff; border-radius: 14px;
            padding: 9px 14px; box-shadow: var(--shadow-sm);
            font-size: 0.8rem; font-weight: 500; color: var(--text-medium);
        }
        .quick-chip .qc-ico {
            width: 26px; height: 26px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.95rem; flex-shrink: 0;
        }
        .quick-chip b { color: var(--text-dark); font-weight: 700; }

        /* ===== HOME SECTION HEADERS ===== */
        .home-section { margin-bottom: 26px; }
        /* 2x2 grid of focus panels below the daily task */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-top: 22px;
        }
        .panel {
            background: #fff;
            border-radius: 22px;
            padding: 20px 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(124,92,255,0.06);
        }
        @media (max-width: 980px) {
            .home-grid { grid-template-columns: 1fr; }
        }
        /* Inner items sit softly inside their panel (no nested-card look) */
        .panel .improve-card,
        .panel .step-card,
        .panel .subject-row,
        .panel .strength-card {
            background: #faf9fe;
            box-shadow: none;
            border: 1px solid rgba(124,92,255,0.05);
        }
        .panel .home-section-head { margin-bottom: 14px; }
        .home-section-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .home-section-head h2 {
            font-size: 1rem; font-weight: 700; color: var(--text-dark);
            display: flex; align-items: center; gap: 8px;
        }
        .see-more-btn {
            font-family: 'Rubik', sans-serif;
            font-size: 0.74rem; font-weight: 600; color: #7c5cff;
            background: transparent; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 3px;
            padding: 4px 6px; border-radius: 8px; transition: background 0.2s;
        }
        .see-more-btn:hover { background: rgba(124,92,255,0.08); }

        /* ===== COPILOT SECTION SPARK (hover-reveal "summary" button) ===== */
        .copilot-spark {
            display: inline-flex; align-items: center; gap: 4px;
            font-family: 'Rubik', sans-serif; font-size: 0.66rem; font-weight: 700;
            color: #7c5cff;
            background: linear-gradient(135deg, #f3eeff, #ece4ff);
            border: 1px solid #e2d8fb; border-radius: 999px;
            padding: 3px 9px; cursor: pointer; white-space: nowrap;
            opacity: 0; transform: translateY(-3px);
            transition: opacity .18s ease, transform .18s ease, background .18s ease, color .18s ease;
            pointer-events: none;
        }
        .panel:hover .copilot-spark,
        .deep-block:hover .copilot-spark,
        .lp-card:hover .copilot-spark { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .copilot-spark:hover { background: linear-gradient(135deg, #7c5cff, #9f7afe); color: #fff; border-color: transparent; }
        .copilot-spark .cs-ico { font-size: 0.72rem; }

        /* CTA button inside chat bubbles */
        .chat-cta {
            display: inline-flex; align-items: center; gap: 4px;
            font-family: 'Rubik', sans-serif; font-size: 0.76rem; font-weight: 700;
            color: #fff; background: linear-gradient(135deg, #7c5cff, #9f7afe);
            border: none; border-radius: 999px; padding: 7px 14px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(124,92,255,0.28); transition: transform .15s ease, box-shadow .15s ease;
        }
        .chat-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(124,92,255,0.36); }

        /* ===== HERO CARD (primary task) ===== */
        .hero-card {
            position: relative; overflow: hidden;
            background: linear-gradient(120deg, #6d4dff 0%, #8b63ff 55%, #9f7afe 100%);
            border-radius: 26px;
            padding: 22px 32px;
            color: #fff;
            box-shadow: 0 18px 42px rgba(124,92,255,0.34);
            display: flex; align-items: center; gap: 18px; min-height: 172px;
        }
        .hero-card .spark { position: absolute; color: rgba(255,255,255,0.55); z-index: 1; }
        .hero-body { flex: 1; position: relative; z-index: 2; }
        .hero-eyebrow { font-size: 0.82rem; font-weight: 600; opacity: 0.92; display: flex; align-items: center; gap: 6px; }
        .hero-title { font-size: 1.55rem; font-weight: 800; margin: 8px 0 6px; line-height: 1.32; }
        .hero-subtitle { font-size: 0.86rem; opacity: 0.92; margin-bottom: 16px; }
        .hero-illu {
            flex-shrink: 0; position: relative; z-index: 2;
            width: 168px; height: 150px;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-illu .illu-circle {
            width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle at 38% 30%, rgba(255,255,255,0.34), rgba(255,255,255,0.06));
            display: flex; align-items: center; justify-content: center;
            font-size: 3.8rem;
            box-shadow: inset 0 0 32px rgba(255,255,255,0.2);
        }
        .hero-illu .illu-float { position: absolute; font-size: 1.5rem; animation: bob 3s ease-in-out infinite; }
        .hero-cta {
            font-family: 'Rubik', sans-serif;
            font-size: 0.9rem; font-weight: 700; color: #7c5cff;
            background: #fff; border: none; border-radius: 14px;
            padding: 11px 26px; cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            transition: transform 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .hero-cta:hover { transform: translateY(-2px); }

        /* ===== STRENGTH CARDS ===== */
        .strengths-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .strength-card {
            background: #fff; border-radius: 18px;
            padding: 18px 14px; box-shadow: var(--shadow-sm);
            text-align: center; transition: transform 0.2s;
        }
        .strength-card:hover { transform: translateY(-3px); }
        .strength-ico {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; margin: 0 auto 12px;
        }
        .strength-name { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); }
        .strength-desc { font-size: 0.74rem; color: var(--text-light); margin-top: 5px; line-height: 1.45; }

        /* ===== IMPROVE CARDS (what helps me grow) ===== */
        .improve-list { display: flex; flex-direction: column; gap: 10px; }
        .improve-card {
            background: #fff; border-radius: 18px;
            padding: 16px 18px; box-shadow: var(--shadow-sm);
        }
        .improve-top { display: flex; align-items: center; gap: 14px; }
        .improve-ico {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.7rem; flex-shrink: 0;
        }
        .improve-main { flex: 1; }
        .improve-title { font-size: 0.93rem; font-weight: 700; color: var(--text-dark); margin-bottom: 9px; }
        .improve-sub { font-size: 0.74rem; color: var(--text-light); margin-top: 2px; }
        .improve-toggle {
            font-family: 'Rubik', sans-serif;
            font-size: 0.74rem; font-weight: 600; color: #2f855a;
            background: rgba(72,187,120,0.14); border: none;
            border-radius: 999px; padding: 6px 14px; cursor: pointer;
            white-space: nowrap; transition: background 0.2s;
        }
        .improve-toggle:hover { background: rgba(72,187,120,0.24); }
        .improve-tip {
            font-size: 0.78rem; color: var(--text-medium); line-height: 1.5;
            margin-top: 0; max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease, margin-top 0.3s ease;
        }
        .improve-card.open .improve-tip { max-height: 120px; margin-top: 12px; }

        /* ===== STEPS (goals on home) ===== */
        .steps-list { display: flex; flex-direction: column; gap: 10px; }
        .step-card {
            background: #fff; border-radius: 16px;
            padding: 14px 18px; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 12px;
        }
        .step-grip {
            color: #d4cdec; font-size: 1rem; letter-spacing: -3px;
            cursor: grab; flex-shrink: 0; user-select: none;
        }
        .step-text { flex: 1; font-size: 0.9rem; font-weight: 500; color: var(--text-dark); line-height: 1.45; }
        .step-check {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid #d9f0e2; background: #fff; color: #48bb78;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
        }
        .step-check:hover { border-color: #48bb78; }
        .step-check.done { background: linear-gradient(135deg,#48bb78,#38a169); border-color: #48bb78; color: #fff; }

        /* ===== SUBJECTS SUMMARY (home) ===== */
        .subjects-summary { display: flex; flex-direction: column; gap: 10px; }
        .subject-row {
            background: #fff; border-radius: 16px;
            padding: 14px 18px; box-shadow: var(--shadow-sm);
            display: flex; align-items: center; gap: 14px;
        }
        .subject-row-ico {
            width: 42px; height: 42px; border-radius: 13px;
            display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
            flex-shrink: 0; order: 3;
        }
        .subject-row-name { font-size: 0.92rem; font-weight: 700; color: var(--text-dark); min-width: 70px; order: 1; }
        .subject-bar-wrap { flex: 1; display: flex; align-items: center; gap: 10px; order: 2; }
        .subject-bar-track { position: relative; flex: 1; height: 9px; background: #f0edf7; border-radius: 6px; overflow: hidden; }
        .subject-bar-fill { position: absolute; right: 0; top: 0; height: 100%; border-radius: 6px; transition: width 0.8s ease; }
        .subject-bar-pill {
            flex-shrink: 0;
            font-size: 0.64rem; font-weight: 700; padding: 3px 10px; border-radius: 999px;
            background: #f4f1fb; white-space: nowrap;
        }
        .subject-bar-pill.level-great { color: #2f855a; }
        .subject-bar-pill.level-good { color: #3182ce; }
        .subject-bar-pill.level-building { color: #7c5cff; }

        /* ===== AGENCY ("מצפן הפעלנות") ===== */
        .agency-radar-svg { width: 100%; height: auto; display: block; overflow: visible; }
        /* home summary panel */
        .agency-summary-body { display: flex; align-items: center; gap: 22px; }
        .agency-mini-radar { width: 168px; flex-shrink: 0; }
        .agency-summary-side { flex: 1; min-width: 0; }
        .agency-highlight {
            font-size: 0.92rem; color: var(--text-medium); margin-bottom: 12px;
        }
        .agency-highlight strong { color: #4a3d8f; }
        .agency-chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
        .agency-chip {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.72rem; font-weight: 700; padding: 5px 11px; border-radius: 999px;
            white-space: nowrap;
        }
        /* deep view */
        .agency-radar-wrap {
            background: #fff; border-radius: 22px; padding: 18px;
            box-shadow: var(--shadow-sm); border: 1px solid rgba(124,92,255,0.06);
            max-width: 360px; margin: 0 auto 20px;
        }
        .agency-cards { display: flex; flex-direction: column; gap: 12px; }
        .agency-card {
            background: #fff; border-radius: 18px; padding: 14px 16px;
            box-shadow: var(--shadow-sm); border: 1px solid rgba(124,92,255,0.06);
            cursor: pointer; transition: box-shadow 0.2s, transform 0.15s;
        }
        .agency-card:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(102,126,234,0.12); }
        .agency-card-head { display: flex; align-items: center; gap: 12px; }
        .agency-ico {
            width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }
        .agency-card-main { flex: 1; min-width: 0; }
        .agency-name { font-size: 0.96rem; font-weight: 700; color: var(--text-dark); }
        .agency-line { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; line-height: 1.4; }
        .agency-pill {
            flex-shrink: 0; font-size: 0.68rem; font-weight: 800;
            padding: 4px 11px; border-radius: 999px; white-space: nowrap;
        }
        .agency-caret { flex-shrink: 0; color: #c0b6e4; font-size: 0.8rem; transition: transform 0.25s; }
        .agency-card.open .agency-caret { transform: rotate(180deg); }
        .agency-bar { height: 8px; background: #f0edf7; border-radius: 6px; overflow: hidden; margin-top: 12px; }
        .agency-fill { height: 100%; border-radius: 6px; width: 0; transition: width 0.8s cubic-bezier(.22,.9,.3,1); }
        .agency-detail {
            max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.32s ease, opacity 0.32s ease, margin 0.32s ease;
        }
        .agency-card.open .agency-detail { max-height: 240px; opacity: 1; margin-top: 12px; }
        .agency-meaning {
            font-size: 0.82rem; color: var(--text-medium); line-height: 1.5;
            background: #f7f5fc; border-radius: 12px; padding: 10px 12px;
        }
        .agency-meaning strong { color: #4a3d8f; }
        .agency-next {
            font-size: 0.82rem; color: var(--text-medium); line-height: 1.5;
            margin-top: 8px; display: flex; gap: 7px; align-items: flex-start;
        }
        .agency-next b { color: #6b4ddb; font-weight: 700; white-space: nowrap; }
        .agency-source { font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; }
        @media (max-width: 600px) {
            .agency-summary-body { flex-direction: column; align-items: stretch; }
            .agency-mini-radar { width: 150px; margin: 0 auto; }
        }

        /* ===== FOCUS / JOURNEY ("הצעדים שלי") ===== */
        .focus-wrap { max-width: 620px; margin: 0 auto; }
        .focus-card {
            display: flex; align-items: center; gap: 18px;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
            border-radius: 26px; padding: 24px 26px; color: #fff;
            box-shadow: 0 18px 40px rgba(124,92,255,0.28); margin-bottom: 22px;
        }
        .focus-card.is-done { background: linear-gradient(135deg, #48bb78, #68d391); box-shadow: 0 18px 40px rgba(72,187,120,0.28); }
        .focus-card.celebrate { background: linear-gradient(135deg, #f6ad55, #ed8fb0); box-shadow: 0 18px 40px rgba(246,173,85,0.3); }
        .focus-body { flex: 1; min-width: 0; }
        .focus-eyebrow { font-size: 0.8rem; font-weight: 700; opacity: 0.92; margin-bottom: 8px; }
        .focus-goal { font-size: 1.32rem; font-weight: 800; line-height: 1.4; margin-bottom: 18px; }
        .focus-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .focus-btn {
            border: none; background: #fff; color: #6b4ddb; font-weight: 800; font-size: 0.92rem;
            padding: 11px 20px; border-radius: 999px; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; transition: transform 0.15s, box-shadow 0.2s;
        }
        .focus-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.18); }
        .focus-btn.secondary { background: rgba(255,255,255,0.22); color: #fff; }
        .focus-illu {
            width: 84px; height: 84px; border-radius: 24px; background: rgba(255,255,255,0.18);
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem; flex-shrink: 0;
        }

        .journey { max-width: 620px; margin: 0 auto; }
        .journey-progress { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .journey-count { font-size: 0.92rem; color: var(--text-medium); }
        .journey-count strong { color: #6b4ddb; font-size: 1.05rem; }
        .journey-dots { display: flex; gap: 6px; }
        .jdot { width: 9px; height: 9px; border-radius: 50%; background: #e3ddf3; transition: transform 0.2s; }
        .jdot.done { background: #48bb78; }
        .jdot.current { background: #7c5cff; transform: scale(1.35); }

        .path { position: relative; }
        .path-line { position: absolute; right: 23px; top: 24px; bottom: 24px; width: 2px; background: #ece7f8; z-index: 1; }
        .path-node { display: flex; align-items: center; gap: 14px; padding: 9px 0; position: relative; cursor: pointer; transition: transform 0.15s; }
        .path-node:hover { transform: translateX(-3px); }
        .node-badge {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; flex-shrink: 0; z-index: 2; border: 3px solid #fff; box-shadow: var(--shadow-sm);
            background: #f3f0fb;
        }
        .path-node.done .node-badge { background: #e6f7ee; color: #2f855a; }
        .path-node.current .node-badge { background: linear-gradient(135deg, #7c5cff, #9f7afe); color: #fff; box-shadow: 0 0 0 6px rgba(124,92,255,0.16); animation: focusPulse 2.2s infinite; }
        .path-node.upcoming { opacity: 0.72; }
        .node-title { font-size: 0.96rem; font-weight: 600; color: var(--text-dark); line-height: 1.35; }
        .path-node.current .node-title { font-weight: 700; color: #4a3d8f; }
        .node-status { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }
        .path-node.current .node-status { color: #7c5cff; font-weight: 600; }
        .path-node.done .node-status { color: #48bb78; }

        .goal-add-mini {
            margin: 20px auto 0; display: block; background: #f4f1fb; color: #6b4ddb; border: 1.5px dashed #c9bdf0;
            font-weight: 700; font-size: 0.88rem; padding: 10px 18px; border-radius: 999px; cursor: pointer; transition: background 0.2s;
        }
        .goal-add-mini:hover { background: #ece6fa; }
        .goal-add-inline { display: flex; gap: 8px; margin-top: 14px; max-width: 620px; margin-left: auto; margin-right: auto; }

        @keyframes focusPulse {
            0%, 100% { box-shadow: 0 0 0 6px rgba(124,92,255,0.16); }
            50% { box-shadow: 0 0 0 11px rgba(124,92,255,0.06); }
        }
        @media (max-width: 600px) {
            .focus-card { flex-direction: column; text-align: center; }
            .focus-actions { justify-content: center; }
        }

        /* ===== GOAL DOCS CAROUSEL ("היעדים שלי") ===== */
        .docs-carousel { max-width: 640px; margin: 0 auto; display: flex; align-items: center; gap: 10px; }
        .docs-arrow {
            width: 46px; height: 46px; border-radius: 50%; border: none; background: #fff;
            box-shadow: var(--shadow-sm); cursor: pointer; font-size: 1.5rem; color: #7c5cff;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, background 0.2s; line-height: 1;
            direction: initial;
        }
        .docs-arrow:hover:not(:disabled) { background: #f4f1fb; transform: scale(1.08); }
        .docs-arrow:disabled { opacity: 0.35; cursor: default; }
        .docs-stage { flex: 1; min-width: 0; }
        .docs-stage.anim-next { animation: docSlideNext 0.35s ease; }
        .docs-stage.anim-prev { animation: docSlidePrev 0.35s ease; }
        @keyframes docSlideNext { from { opacity: 0.3; transform: translateX(42px); } to { opacity: 1; transform: none; } }
        @keyframes docSlidePrev { from { opacity: 0.3; transform: translateX(-42px); } to { opacity: 1; transform: none; } }

        .doc-card {
            background: #fff; border-radius: 22px; box-shadow: var(--shadow-sm);
            border: 1px solid rgba(124,92,255,0.07); overflow: hidden; cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .doc-card:hover { box-shadow: 0 12px 32px rgba(102,126,234,0.13); }
        .doc-top { display: flex; align-items: center; gap: 10px; padding: 16px 18px 0; }
        .doc-stage-badge {
            background: linear-gradient(135deg, #7c5cff, #9f7afe); color: #fff;
            font-size: 0.74rem; font-weight: 700; padding: 5px 13px; border-radius: 999px;
        }
        .doc-date { margin-inline-start: auto; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
        .doc-people { display: flex; gap: 18px; padding: 13px 18px 0; flex-wrap: wrap; }
        .doc-person { display: flex; align-items: center; gap: 6px; font-size: 0.84rem; color: var(--text-medium); }
        .doc-person .lbl { color: var(--text-muted); }
        .doc-section-label { font-size: 0.74rem; font-weight: 700; color: #9a8fc4; margin: 15px 18px 5px; }
        .doc-transcript { padding: 0 18px; font-size: 0.88rem; color: var(--text-medium); line-height: 1.65; }
        .doc-transcript.clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .doc-card.expanded .doc-transcript.clamp { -webkit-line-clamp: unset; overflow: visible; }
        .doc-next { margin: 14px 18px 0; background: #f7f5fc; border-radius: 14px; padding: 12px 14px; }
        .doc-next-title { font-size: 0.78rem; font-weight: 700; color: #6b4ddb; margin-bottom: 7px; }
        .doc-next-item { font-size: 0.86rem; color: var(--text-medium); display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 4px 0; }
        .doc-deadline { font-size: 0.74rem; color: #c97a16; font-weight: 700; white-space: nowrap; }
        .doc-foot { padding: 15px 18px 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .doc-hint { font-size: 0.78rem; color: var(--text-light); }
        .doc-summarize-btn {
            background: linear-gradient(135deg, #7c5cff, #4cc9f0); color: #fff; border: none;
            font-weight: 700; font-size: 0.88rem; padding: 10px 18px; border-radius: 999px;
            cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: transform 0.15s, box-shadow 0.2s;
        }
        .doc-summarize-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,92,255,0.3); }
        .docs-dots { display: flex; justify-content: center; gap: 7px; margin-top: 18px; }
        .docs-dot { width: 8px; height: 8px; border-radius: 50%; background: #e3ddf3; cursor: pointer; transition: width 0.25s, background 0.25s; }
        .docs-dot.active { background: #7c5cff; width: 22px; border-radius: 999px; }

        /* add-doc button + empty state */
        .docs-add-btn {
            display: inline-flex; align-items: center; gap: 8px; margin: 22px auto 0;
            background: #fff; color: #7c5cff; border: 1.5px solid #d9cffa; box-shadow: var(--shadow-sm);
            font-weight: 700; font-size: 0.92rem; padding: 11px 22px; border-radius: 999px; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
        }
        .docs-add-btn:hover { transform: translateY(-2px); background: #f4f1fb; box-shadow: 0 8px 20px rgba(124,92,255,0.22); }
        .docs-empty {
            max-width: 520px; margin: 6px auto 0; background: #fff; border-radius: 22px;
            padding: 34px 26px; text-align: center; box-shadow: var(--shadow-sm);
            border: 1px solid rgba(124,92,255,0.07);
        }
        .docs-empty .emoji { font-size: 2.6rem; margin-bottom: 8px; }
        .docs-empty h3 { font-size: 1.05rem; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
        .docs-empty p { font-size: 0.9rem; color: var(--text-light); line-height: 1.6; }

        /* meetings timeline (overview list under the carousel) */
        .docs-timeline { max-width: 640px; margin: 32px auto 0; }
        .docs-tl-title { font-size: 0.92rem; font-weight: 800; color: #4a3d8f; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
        .docs-tl-list { display: flex; flex-direction: column; gap: 8px; }
        .docs-tl-row {
            display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 14px;
            padding: 12px 16px; cursor: pointer; box-shadow: var(--shadow-sm);
            border: 1.5px solid transparent; transition: border-color 0.15s, transform 0.15s, background 0.15s;
        }
        .docs-tl-row:hover { transform: translateX(-3px); border-color: #e0d7fa; }
        .docs-tl-row.active { border-color: #9f7afe; background: #faf8ff; }
        .docs-tl-dot { width: 10px; height: 10px; border-radius: 50%; background: #d9cffa; flex-shrink: 0; transition: background 0.15s; }
        .docs-tl-row.active .docs-tl-dot { background: #7c5cff; }
        .docs-tl-main { min-width: 0; }
        .docs-tl-stage { font-size: 0.86rem; font-weight: 700; color: var(--text-dark); }
        .docs-tl-meta { font-size: 0.76rem; color: var(--text-light); margin-top: 1px; }
        .docs-tl-date { margin-inline-start: auto; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

        /* doc form modal */
        .docform-overlay {
            position: fixed; inset: 0; background: rgba(40,30,80,0.45); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .docform-overlay.open { opacity: 1; pointer-events: auto; }
        .docform {
            background: #fff; border-radius: 24px; width: 100%; max-width: 560px; max-height: 90vh;
            overflow-y: auto; padding: 26px 24px; box-shadow: 0 20px 60px rgba(60,40,120,0.3);
            transform: translateY(16px); transition: transform 0.25s;
        }
        .docform-overlay.open .docform { transform: none; }
        .docform h2 { font-size: 1.15rem; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
        .docform-sub { font-size: 0.84rem; color: var(--text-light); margin-bottom: 18px; }
        .docform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
        .docform-field { margin-bottom: 14px; }
        .docform-field label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--text-medium); margin-bottom: 6px; }
        .docform-field input, .docform-field select, .docform-field textarea {
            width: 100%; border: 1.5px solid #e6e1f3; border-radius: 12px; padding: 10px 12px;
            font-family: inherit; font-size: 0.9rem; color: var(--text-dark); background: #faf9fe;
            box-sizing: border-box; transition: border-color 0.15s;
        }
        .docform-field textarea { min-height: 92px; resize: vertical; line-height: 1.6; }
        .docform-field input:focus, .docform-field select:focus, .docform-field textarea:focus { outline: none; border-color: #9f7afe; background: #fff; }
        .docstep-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .docstep-row .step-text { flex: 1; }
        .docstep-row .step-deadline { width: 148px; flex-shrink: 0; }
        .docstep-remove { flex-shrink: 0; width: 34px; height: 34px; border-radius: 10px; border: none; background: #f3eefc; color: #9a8fc4; cursor: pointer; font-size: 0.85rem; transition: background 0.15s, color 0.15s; }
        .docstep-remove:hover { background: #efe7fb; color: #7c5cff; }
        .docform-addstep { background: none; border: 1.5px dashed #c9bff0; color: #7c5cff; border-radius: 10px; padding: 8px 14px; cursor: pointer; font-weight: 700; font-size: 0.82rem; transition: background 0.15s; }
        .docform-addstep:hover { background: #f6f3fd; }
        .docform-actions { display: flex; gap: 10px; margin-top: 20px; }
        .docform-save { background: linear-gradient(135deg, #7c5cff, #4cc9f0); color: #fff; border: none; padding: 12px 24px; border-radius: 999px; font-weight: 800; cursor: pointer; font-size: 0.92rem; transition: transform 0.15s, box-shadow 0.2s; }
        .docform-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,92,255,0.3); }
        .docform-cancel { background: #f0edf9; color: var(--text-medium); border: none; padding: 12px 22px; border-radius: 999px; font-weight: 700; cursor: pointer; font-size: 0.92rem; transition: background 0.15s; }
        .docform-cancel:hover { background: #e7e1f5; }
        @media (max-width: 560px) {
            .docform-grid { grid-template-columns: 1fr; }
            .docstep-row { flex-wrap: wrap; }
            .docstep-row .step-deadline { width: 100%; }
        }

        /* ===== ACCORDION (deep screens) ===== */
        .accordion { display: flex; flex-direction: column; gap: 10px; }
        .acc-item { background: #fff; border-radius: 14px; box-shadow: var(--shadow-sm); overflow: hidden; }
        .acc-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; cursor: pointer; user-select: none;
        }
        .acc-head h3 { font-size: 0.9rem; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; gap: 8px; }
        .acc-arrow { color: #b6abdd; transition: transform 0.25s; font-size: 0.8rem; }
        .acc-item.open .acc-arrow { transform: rotate(180deg); }
        .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
        .acc-item.open .acc-body { max-height: 600px; }
        .acc-body-inner { padding: 0 18px 16px; }

        /* ===== BADGES (strengths deep) ===== */
        .badge-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .badge {
            display: inline-flex; align-items: center; gap: 7px;
            background: #fff; border-radius: 999px;
            padding: 9px 16px; box-shadow: var(--shadow-sm); cursor: pointer;
            font-size: 0.82rem; font-weight: 600; color: var(--text-dark);
            border: 1.5px solid transparent; transition: all 0.2s;
        }
        .badge:hover { border-color: #c4b5fd; transform: translateY(-2px); }
        .badge.selected { border-color: #7c5cff; background: rgba(124,92,255,0.06); }
        .badge-explain {
            font-size: 0.78rem; color: var(--text-medium); line-height: 1.5;
            background: rgba(124,92,255,0.05); border-radius: 12px;
            padding: 0 14px; max-height: 0; overflow: hidden;
            margin-top: 0; transition: all 0.3s ease;
        }
        .badge-explain.show { max-height: 90px; padding: 12px 14px; margin-top: 12px; }

        .deep-block { margin-bottom: 22px; }
        .deep-block-title {
            font-size: 0.82rem; font-weight: 700; color: #7c5cff;
            margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }

        /* learning profile lists */
        .lp-card {
            background: #fff; border-radius: 14px; padding: 16px 18px;
            box-shadow: var(--shadow-sm); margin-bottom: 12px;
        }
        .lp-card h3 { font-size: 0.9rem; font-weight: 700; color: var(--text-dark); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .lp-list { display: flex; flex-direction: column; gap: 8px; }
        .lp-row { display: flex; align-items: center; gap: 9px; font-size: 0.82rem; color: var(--text-medium); }
        .lp-row .lp-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        @media (max-width: 768px) {
            .strengths-row { grid-template-columns: 1fr; }
            .greeting { flex-direction: row; }
            .hero-card { flex-direction: column; text-align: center; }
        }

        /* ===== YUBI CHAT ===== */
        .yubi-launcher {
            position: fixed; bottom: 22px; left: 22px; z-index: 250;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .yubi-launcher.hidden { display: none; }

        .yubi-bubble {
            position: relative;
            background: #fff; border-radius: 18px;
            padding: 14px 16px 13px; width: 210px;
            box-shadow: 0 14px 34px rgba(76,58,160,0.22);
            border: 1px solid #f0ecfb;
            text-align: center;
            animation: bubbleIn 0.4s ease both, bubbleFloat 3.6s ease-in-out 0.4s infinite;
        }
        .yubi-bubble strong { display:block; font-size: 0.92rem; color: #4a3d8f; margin-bottom: 3px; }
        .yubi-bubble span { display:block; font-size: 0.74rem; color: var(--text-light); line-height: 1.4; margin-bottom: 10px; }
        .yubi-bubble-btn {
            border: none; cursor: pointer;
            background: linear-gradient(135deg, #7c5cff, #9f7afe); color: #fff;
            font-family: 'Rubik', sans-serif; font-size: 0.82rem; font-weight: 700;
            padding: 9px 18px; border-radius: 999px;
            box-shadow: 0 6px 16px rgba(124,92,255,0.4);
            transition: transform 0.15s, filter 0.2s;
        }
        .yubi-bubble-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
        /* little tail pointing down to Yubi */
        .yubi-bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 16px; background: #fff;
            border-right: 1px solid #f0ecfb; border-bottom: 1px solid #f0ecfb;
            transform: translateX(-50%) rotate(45deg);
        }
        .yubi-bubble-close {
            position: absolute; top: 6px; left: 8px;
            background: none; border: none; cursor: pointer;
            color: #c5bedd; font-size: 0.8rem; line-height: 1;
        }
        @keyframes bubbleIn { from { opacity:0; transform: translateY(8px) scale(0.92); } to { opacity:1; transform: translateY(0) scale(1); } }
        @keyframes bubbleFloat { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-4px); } }

        .yubi-fab {
            position: relative; border: none; cursor: pointer; padding: 0;
            width: 132px; height: 132px; border-radius: 50%;
            background:
                radial-gradient(circle at 50% 44%, rgba(159,122,254,0.42), rgba(124,92,255,0.18) 58%, rgba(124,92,255,0) 74%);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
            animation: fabBob 3.4s ease-in-out infinite;
        }
        .yubi-fab::before {
            /* a clear, soft clickable disc behind Yubi */
            content: ''; position: absolute; inset: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 38%, #ffffff, #efe9ff 70%);
            box-shadow: 0 12px 30px rgba(124,92,255,0.38), inset 0 0 0 2px rgba(124,92,255,0.12);
        }
        @keyframes fabBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .yubi-fab:hover { transform: scale(1.07); }
        .yubi-fab .fab-robot { position: relative; z-index: 1; width: 100%; height: 100%; pointer-events: none; }
        .yubi-fab .fab-ping {
            position: absolute; top: 22px; right: 22px; z-index: 2; width: 16px; height: 16px;
            background: #48bb78; border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 0 4px rgba(72,187,120,0.25);
        }
        .yubi-fab.hidden { display: none; }

        .yubi-chat {
            position: fixed; bottom: 20px; left: 20px; z-index: 260;
            width: 372px; max-width: calc(100vw - 40px);
            height: 544px; max-height: calc(100vh - 40px);
            background: #fff; border-radius: 22px; overflow: hidden;
            box-shadow: 0 24px 60px rgba(76,58,160,0.32);
            display: flex; flex-direction: column;
            transform: translateY(24px) scale(0.95); opacity: 0; pointer-events: none;
            transition: all 0.32s cubic-bezier(0.18,0.89,0.32,1.1);
        }
        .yubi-chat.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

        .yubi-chat-head {
            display: flex; align-items: center; gap: 9px;
            padding: 11px 13px; color: #fff;
            background: linear-gradient(135deg, #7c5cff, #9f7afe);
        }
        .yubi-head-ava { width: 46px; height: 46px; border-radius: 13px; background: rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
        .yubi-head-ava canvas { display:block; }
        .yubi-head-info { line-height: 1.2; }
        .yubi-head-info strong { font-size: 0.9rem; display:block; }
        .yubi-head-info small { font-size: 0.64rem; opacity: 0.9; display:flex; align-items:center; gap:4px; }
        .yubi-head-info .dot { width:6px;height:6px;border-radius:50%;background:#7ef0a8; display:inline-block; }
        .mode-toggle { display:flex; gap:3px; background: rgba(255,255,255,0.16); padding:3px; border-radius:10px; margin-right:auto; }
        .mode-toggle button { border:none; background:transparent; color:#fff; font-family:'Rubik',sans-serif; font-size:0.66rem; padding:5px 8px; border-radius:8px; cursor:pointer; opacity:0.85; transition: all 0.2s; white-space:nowrap; }
        .mode-toggle button.active { background:#fff; color:#7c5cff; opacity:1; font-weight:600; }
        .yubi-close { background: rgba(255,255,255,0.2); border:none; color:#fff; width:28px;height:28px;border-radius:8px; cursor:pointer; font-size:0.8rem; flex-shrink:0; }

        /* text mode */
        .chat-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; background:#faf9ff; }
        .msg-row { display:flex; gap:8px; align-items:flex-end; max-width:88%; }
        .msg-row.bot { align-self:flex-start; }
        .msg-row.user { align-self:flex-end; flex-direction: row-reverse; }
        .msg-ava { width:28px;height:28px;border-radius:9px;flex-shrink:0; display:flex;align-items:center;justify-content:center; background:linear-gradient(135deg,#7c5cff,#9f7afe); }
        .bubble { padding:9px 13px; border-radius:14px; font-size:0.82rem; line-height:1.5; }
        .msg-row.bot .bubble { background:#fff; color:#3a3360; border-bottom-right-radius:4px; box-shadow:0 2px 8px rgba(124,92,255,0.08); }
        .msg-row.user .bubble { background:linear-gradient(135deg,#7c5cff,#9f7afe); color:#fff; border-bottom-left-radius:4px; }
        .typing { display:flex; gap:4px; padding:12px 14px; background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(124,92,255,0.08); }
        .typing span { width:7px;height:7px;border-radius:50%;background:#c4b5fd; animation:typedot 1.2s infinite; }
        .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
        @keyframes typedot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

        .chat-suggestions { display:flex; gap:6px; flex-wrap:wrap; padding:0 14px 8px; background:#faf9ff; }
        .chat-suggestions button { font-family:'Rubik',sans-serif; font-size:0.7rem; color:#7c5cff; background:#fff; border:1px solid #e7e0fb; border-radius:999px; padding:5px 11px; cursor:pointer; transition:all 0.2s; }
        .chat-suggestions button:hover { background:#7c5cff; color:#fff; }

        .chat-input { display:flex; gap:8px; padding:10px 12px; border-top:1px solid #f0edf7; background:#fff; }
        .chat-input input { flex:1; border:1px solid #e7e0fb; border-radius:999px; padding:9px 14px; font-family:'Rubik',sans-serif; font-size:0.82rem; outline:none; }
        .chat-input input:focus { border-color:#7c5cff; }
        .chat-input button { width:38px;height:38px;border-radius:50%; border:none; background:linear-gradient(135deg,#7c5cff,#9f7afe); color:#fff; cursor:pointer; font-size:1rem; flex-shrink:0; }

        /* voice mode (jarvis) */
        .voice-stage { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:22px; background: radial-gradient(circle at 50% 38%, #1e1b3a, #0c0a1d); }
        .yubi-chat.voice .chat-body, .yubi-chat.voice .chat-suggestions, .yubi-chat.voice .chat-input { display:none; }
        .yubi-chat.voice .voice-stage { display:flex; }

        .jarvis-orb { position:relative; width:180px; height:180px; display:flex; align-items:center; justify-content:center; }
        .jarvis-ring { position:absolute; border-radius:50%; }
        .r1{ width:96px;height:96px; border:2px solid rgba(76,201,240,0.55);} .r2{ width:138px;height:138px; border:2px solid rgba(124,92,255,0.4);} .r3{ width:180px;height:180px; border:2px solid rgba(76,201,240,0.2);}
        .jarvis-core { width:74px;height:74px;border-radius:50%; background: radial-gradient(circle at 35% 30%, #6ee7ff, #4cc9f0 42%, #7c5cff); box-shadow:0 0 34px rgba(76,201,240,0.7), inset 0 0 22px rgba(255,255,255,0.4); transition: opacity 0.3s, background 0.3s; }
        .jarvis-bars { position:absolute; display:flex; gap:4px; align-items:center; height:60px; opacity:0; transition:opacity 0.3s; }
        .jarvis-bars i { width:5px; height:12px; background:linear-gradient(#6ee7ff,#7c5cff); border-radius:3px; display:inline-block; }

        .jarvis-orb.idle .jarvis-ring { animation: ringPulse 3s ease-in-out infinite; }
        .jarvis-orb.idle .jarvis-core { animation: coreFloat 3s ease-in-out infinite; }
        .jarvis-orb.active .jarvis-core { opacity:0.2; }
        .jarvis-orb.active .jarvis-bars { opacity:1; }
        .jarvis-orb.active .jarvis-bars i { animation: barJump 0.7s ease-in-out infinite; }
        .jarvis-orb.active .jarvis-ring { animation: ringPulseFast 1.1s ease-in-out infinite; }
        .jarvis-orb.listening .jarvis-core { background: radial-gradient(circle at 35% 30%, #7ef0a8, #48bb78 42%, #4cc9f0); }
        .jarvis-bars i:nth-child(1){animation-delay:0s} .jarvis-bars i:nth-child(2){animation-delay:0.12s} .jarvis-bars i:nth-child(3){animation-delay:0.24s} .jarvis-bars i:nth-child(4){animation-delay:0.36s} .jarvis-bars i:nth-child(5){animation-delay:0.18s} .jarvis-bars i:nth-child(6){animation-delay:0.3s} .jarvis-bars i:nth-child(7){animation-delay:0.06s} .jarvis-bars i:nth-child(8){animation-delay:0.22s} .jarvis-bars i:nth-child(9){animation-delay:0.1s}
        @keyframes barJump { 0%,100%{ height:10px } 50%{ height:48px } }
        @keyframes ringPulse { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.07);opacity:1} }
        @keyframes ringPulseFast { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.13);opacity:1} }
        @keyframes coreFloat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

        .voice-caption { color:#cdd6ff; font-size:0.86rem; text-align:center; padding:0 26px; min-height:46px; line-height:1.5; }
        .mic-btn { width:64px;height:64px;border-radius:50%; border:none; cursor:pointer; font-size:1.5rem; background:linear-gradient(135deg,#4cc9f0,#7c5cff); color:#fff; box-shadow:0 8px 24px rgba(76,201,240,0.45); transition: transform 0.2s; }
        .mic-btn:hover { transform:scale(1.08); }
        .mic-btn.recording { background:linear-gradient(135deg,#7ef0a8,#48bb78); animation: micPulse 1s infinite; }
        @keyframes micPulse { 0%,100%{box-shadow:0 8px 24px rgba(72,187,120,0.45)} 50%{box-shadow:0 8px 40px rgba(72,187,120,0.85)} }

        @media (max-width: 480px) {
            .yubi-chat { left: 0; right: 0; bottom: 0; width: 100%; max-width: 100%; height: 80vh; border-radius: 22px 22px 0 0; }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.3s ease forwards; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; padding: 16px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .subjects-grid { grid-template-columns: 1fr; }
            .competencies-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 1100px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Loading state -->
        <div id="dashboardLoading" style="text-align:center; padding:80px 20px;">
            <div style="width:48px;height:48px;border:4px solid #efecf8;border-top-color:#7c5cff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;"></div>
            <div style="font-size:17px;font-weight:700;color:#7c5cff;">יובי בונה את הדשבורד שלך... 🧠</div>
            <div style="font-size:14px;color:#9a93b5;margin-top:8px;">מנתח את נתוני המיפוי ומכין תובנות אישיות</div>
        </div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </main>

    <!-- Real-time update toast -->
    <div class="live-toast" id="liveToast">
        <div class="toast-ico">📈</div>
        <div class="toast-text" id="toastText"></div>
    </div>

    <!-- Yubi Chat Launcher -->
    <div class="yubi-launcher" id="yubiLauncher">
        <div class="yubi-bubble" id="yubiBubble">
            <button class="yubi-bubble-close" id="yubiBubbleClose" aria-label="סגור">✕</button>
            <strong>היי! אני כאן לעזור לך! 👋</strong>
            <span>יש לך שאלה או משהו שאתה מתלבט?</span>
            <button class="yubi-bubble-btn" id="yubiBubbleBtn">בוא נדבר 💬</button>
        </div>
        <button class="yubi-fab" id="yubiFab" aria-label="דבר עם יובי">
            <div class="fab-robot" id="yubiFabRobot"></div>
            <span class="fab-ping"></span>
        </button>
    </div>

    <!-- Yubi Chat Panel -->
    <div class="yubi-chat" id="yubiChat">
        <div class="yubi-chat-head">
            <div class="yubi-head-ava" id="yubiHeadRobot"></div>
            <div class="yubi-head-info">
                <strong>יובי</strong>
                <small><span class="dot"></span> המנטור החכם שלך</small>
            </div>
            <div class="mode-toggle">
                <button type="button" data-mode="text" class="active">💬 טקסט</button>
                <button type="button" data-mode="voice">🎤 קולי</button>
            </div>
            <button class="yubi-close" id="yubiClose" aria-label="סגור">✕</button>
        </div>

        <!-- Text mode -->
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-suggestions" id="chatSuggestions"></div>
        <form class="chat-input" id="chatForm">
            <input id="chatInput" type="text" placeholder="כתוב ליובי..." autocomplete="off" />
            <button type="submit" aria-label="שלח">➤</button>
        </form>

        <!-- Voice mode (Jarvis) -->
        <div class="voice-stage">
            <div class="jarvis-orb idle" id="jarvisOrb">
                <div class="jarvis-ring r3"></div>
                <div class="jarvis-ring r2"></div>
                <div class="jarvis-ring r1"></div>
                <div class="jarvis-core"></div>
                <div class="jarvis-bars"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
            </div>
            <div class="voice-caption" id="voiceCaption">לחצו על המיקרופון כדי לדבר עם יובי 🎤</div>
            <button class="mic-btn" id="micBtn" aria-label="דבר">🎤</button>
        </div>
    </div>

    <script>
        // ================================================
        // LOAD DASHBOARD FROM MAPPING DATA (via AI)
        // ================================================
        let currentData = null;

        async function loadDashboard() {
            const stored = localStorage.getItem('mapping_results');
            if (!stored) {
                document.getElementById('dashboardLoading').innerHTML = `
                    <div style="font-size:48px;margin-bottom:16px;">📋</div>
                    <div style="font-size:18px;font-weight:700;color:#3a3360;margin-bottom:12px;">עדיין אין נתוני מיפוי</div>
                    <div style="font-size:14px;color:#9a93b5;margin-bottom:24px;">כדי לראות את הדשבורד האישי, צריך קודם למלא את השאלון</div>
                    <a href="/learner-mapping/" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#7c5cff,#9f7afe);color:#fff;border-radius:14px;font-weight:700;text-decoration:none;">למילוי השאלון →</a>
                `;
                return;
            }

            const mappingData = JSON.parse(stored);
            const name = mappingData.student_name || 'תלמיד/ה';

            // Update profile name where present (sidebar removed)
            const sbAva = document.getElementById('sidebarAvatar');
            const sbName = document.getElementById('sidebarName');
            if (sbAva) sbAva.textContent = name[0];
            if (sbName) sbName.textContent = name;

            // Check cache - use stored dashboard if mapping data hasn't changed
            const cacheKey = 'dashboard_cache';
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const cacheObj = JSON.parse(cached);
                    if (cacheObj.sourceHash === stored) {
                        currentData = cacheObj.data;
                        renderDashboard(cacheObj.data);
                        return;
                    }
                } catch (e) { /* cache corrupt, regenerate */ }
            }

            try {
                const resp = await fetch('/api/generate-dashboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_name: name, scores: mappingData.scores })
                });

                if (!resp.ok) throw new Error('API error');
                const data = await resp.json();
                currentData = data;

                // Cache the result
                localStorage.setItem(cacheKey, JSON.stringify({ sourceHash: stored, data }));

                renderDashboard(data);
            } catch (err) {
                console.error('Dashboard generation error:', err);
                document.getElementById('dashboardLoading').innerHTML = `
                    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                    <div style="font-size:18px;font-weight:700;color:#3a3360;">שגיאה בטעינת הדשבורד</div>
                    <div style="font-size:14px;color:#9a93b5;margin-top:8px;">נסה לרענן את הדף</div>
                `;
            }
        }

        // ================================================
