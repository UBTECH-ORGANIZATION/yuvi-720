<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var m = document.cookie.match(/(?:^|;\s*)sp_theme=(light|dark|system)/)
        var pref = m ? m[1] : 'dark'
        var dark = pref === 'system' ? matchMedia('(prefers-color-scheme: dark)').matches : pref === 'dark'
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      })()
    </script>
    <link rel="icon" type="image/png" href="/yuvi-favicon.png" />
    <title>Yuvilab Spark</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
