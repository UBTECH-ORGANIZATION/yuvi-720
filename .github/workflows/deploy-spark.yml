name: Build, Deploy Dev & Promote to Production (spark / yuvi-720)

on:
  push:
    branches: [main]
    paths-ignore:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"
  workflow_dispatch:
    inputs:
      promote:
        description: "Promote Dev → Production after deploy?"
        required: true
        type: boolean
        default: false

env:
  ACR_NAME: yuvi720acr
  ACR_LOGIN_SERVER: yuvi720acr.azurecr.io
  IMAGE_NAME: yuvi-720
  RESOURCE_GROUP: rg-yuvi-720
  WEBAPP_NAME: ubi-yuvi-720
  SLOT_NAME: dev

jobs:
  # ── Job 1: Build & Push Docker image ──────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ── Job 2: Deploy to Dev slot (always runs) ───────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://dev.spark.yuvilab.ai
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Dev slot routing
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --slot-settings \
              FRONTEND_URL=https://dev.spark.yuvilab.ai \
              PUBLIC_APP_URL=https://dev.spark.yuvilab.ai \
              WEBSITES_PORT=8000 \
              LLM_STRONG_DEPLOYMENT_NAME=gpt-5.4 \
              LLM_MINI_DEPLOYMENT_NAME=gpt-5.4-mini \
            --output none

      - name: Verify required Dev slot settings
        run: |
          configured_settings="$(az webapp config appsettings list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --output json | jq -r '.[] | select(.value != null and .value != "") | .name')"
          required_settings=(
            APIM_BASE_URL
            APIM_SUBSCRIPTION_KEY
            APIM_API_VERSION
            LLM_STRONG_DEPLOYMENT_NAME
            LLM_MINI_DEPLOYMENT_NAME
            MONGODB_CONNECTION_STRING
            FRONTEND_URL
            PUBLIC_APP_URL
            SECRET_KEY
            WEBSITES_PORT
          )
          missing_settings=()
          for setting_name in "${required_settings[@]}"; do
            if ! grep -qx "$setting_name" <<< "$configured_settings"; then
              missing_settings+=("$setting_name")
            fi
          done
          if (( ${#missing_settings[@]} )); then
            printf 'Missing required Dev slot settings: %s\n' "${missing_settings[*]}"
            exit 1
          fi

      - name: Deploy to Dev slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify Dev route
        run: |
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 10 \
            --retry-all-errors \
            --max-time 30 \
            https://dev.spark.yuvilab.ai/ \
            --output /dev/null
          curl --fail --silent --show-error \
            --retry 6 \
            --retry-delay 10 \
            --retry-all-errors \
            --max-time 30 \
            "https://dev.spark.yuvilab.ai/api/learning/catalog?learner_id=deployment-smoke" \
            | jq -e '.provider_status == "online" and (.units | length) > 0' \
            > /dev/null
          for unity_artifact in \
            unity-world/Build/unity-world.loader.js \
            unity-world/Build/unity-world.framework.js \
            unity-world/Build/unity-world.data \
            unity-world/Build/unity-world.wasm; do
            curl --fail --silent --show-error \
              --retry 6 \
              --retry-delay 10 \
              --retry-all-errors \
              --max-time 60 \
              "https://dev.spark.yuvilab.ai/${unity_artifact}" \
              --output /dev/null
          done

      - name: Azure logout
        run: az logout
        if: always()

  # ── Job 3: Swap Dev → Production (only on manual trigger) ─────
  promote-production:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'workflow_dispatch' && inputs.promote == true
    environment:
      name: production
      url: https://spark.yuvilab.ai
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap Dev slot → Production
        run: |
          echo "🔄 Swapping Dev → Production..."
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production
          echo "✅ Swap completed!"

      - name: Azure logout
        run: az logout
        if: always()
