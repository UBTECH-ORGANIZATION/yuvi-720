name: Build and deploy Spark admin

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/deploy-admin.yml"
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: yuvi720acr.azurecr.io
  IMAGE_NAME: yuvi-720-admin
  WEBAPP_NAME: ${{ vars.ADMIN_WEBAPP_NAME || 'ubi-admin-yuvi-720' }}

concurrency:
  group: spark-admin-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: admin/requirements.txt

      - name: Install and test backend
        run: |
          python -m pip install -r admin/requirements.txt
          PYTHONPATH=admin ADMIN_ENV=test ADMIN_SECRET_KEY=ci-test-secret ADMIN_EMAILS=admin@example.com \
            python -m unittest discover -s admin/backend/tests -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci --prefix admin/frontend
          npm run build --prefix admin/frontend

  build:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push admin image
        run: |
          docker build --platform linux/amd64 \
            --file admin/Dockerfile \
            --tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            admin
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: admin
      url: ${{ vars.ADMIN_URL || 'https://ubi-admin-yuvi-720.azurewebsites.net' }}
    permissions:
      contents: read
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable temporary public admin access
        run: |
          az webapp config appsettings set \
            --resource-group rg-yuvi-720 \
            --name "${{ env.WEBAPP_NAME }}" \
            --settings \
              ADMIN_ENV=production \
              ADMIN_PUBLIC_ACCESS=true \
              ADMIN_BASE_URL=https://admin.spark.yuvilab.ai \
              WEBSITES_PORT=8000 \
            --output none

      - name: Deploy admin Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify production readiness
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              "https://${{ env.WEBAPP_NAME }}.azurewebsites.net/health/ready"; then
              exit 0
            fi
            echo "Admin is not ready yet (attempt ${attempt}/20)"
            sleep 15
          done
          exit 1

      - name: Log out from Azure
        if: always()
        run: az logout
